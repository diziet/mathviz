# Manual descriptions and example configurations for generators.
# The generate_generator_docs.py script merges this into the auto-generated docs.
#
# Structure per generator:
#   <generator_name>:
#     math_description: 2-3 sentence conceptual explanation
#     performance_notes: optional note on computational cost
#     seed_behavior: "deterministic" or "seed-dependent"
#     examples:
#       - description: what this config produces
#         params: {key: value, ...}

# ── Attractors ──────────────────────────────────────────────────────────

aizawa:
  math_description: >
    The Aizawa attractor is a six-parameter dissipative system whose trajectory
    wraps into a toroidal shape with chaotic surface detail. It exhibits
    quasi-periodic motion around a central axis.
  seed_behavior: seed-dependent
  examples:
    - description: "Tighter wrapping with more symmetric loops"
      params: {a: 0.95, b: 0.7, c: 0.65, d: 3.5, e: 0.25, f: 0.1}
    - description: "Wider torus with stronger z-axis oscillation"
      params: {a: 0.8, b: 0.5, c: 0.6, d: 4.0, e: 0.3, f: 0.15}

chen:
  math_description: >
    The Chen attractor is a three-parameter ODE system that produces a
    double-scroll shape. It is closely related to the Lorenz system but with
    different symmetry properties.
  seed_behavior: seed-dependent
  examples:
    - description: "Classic double scroll"
      params: {a: 35.0, b: 3.0, c: 28.0}
    - description: "Tighter scrolls with higher c"
      params: {a: 40.0, b: 3.0, c: 33.0}

clifford:
  math_description: >
    The Clifford attractor is a 2D iterated map producing fractal dust
    patterns. Points are generated by iterating x_{n+1} = sin(a·y_n) + c·cos(a·x_n),
    y_{n+1} = sin(b·x_n) + d·cos(b·y_n), then given z-height from iteration count.
  seed_behavior: deterministic
  examples:
    - description: "Delicate feathered wings"
      params: {a: -1.7, b: 1.3, c: -0.1, d: -1.2}
    - description: "Dense circular cloud"
      params: {a: 1.5, b: -1.8, c: 1.6, d: 0.9}

dequan_li:
  math_description: >
    The Dequan Li attractor is a six-parameter chaotic flow that produces
    multi-scroll shapes. Its trajectory spirals through space creating
    interlinked loops with complex self-intersection.
  seed_behavior: seed-dependent
  examples:
    - description: "Default multi-scroll shape"
      params: {a: 40.0, c: 1.833, d: 0.16, e: 0.65, f: 20.0, k: 55.0}

double_pendulum:
  math_description: >
    A double pendulum is a pendulum with another pendulum attached to its end.
    Despite simple construction, it exhibits rich chaotic motion. The 4D phase
    space (two angles, two angular velocities) is projected to 3D.
  performance_notes: "Integration time scales linearly with integration_steps"
  seed_behavior: seed-dependent
  examples:
    - description: "Wide chaotic sweep from near-vertical start"
      params: {theta1: 3.0, theta2: 2.5, mass: 1.0, length: 1.0}
    - description: "Gentler motion with lower initial angles"
      params: {theta1: 1.5, theta2: 1.0, mass: 1.0, length: 1.0}

halvorsen:
  math_description: >
    The Halvorsen attractor is a single-parameter system producing a
    three-winged shape with cyclic symmetry. Each wing spirals outward
    before folding back toward the center.
  seed_behavior: seed-dependent
  examples:
    - description: "Classic three-winged shape"
      params: {a: 1.89}
    - description: "Wider wings with lower damping"
      params: {a: 1.4}

lorenz:
  math_description: >
    The Lorenz system is the canonical strange attractor, arising from a
    simplified model of atmospheric convection. Its famous butterfly-shaped
    trajectory never repeats and is highly sensitive to initial conditions.
  seed_behavior: seed-dependent
  examples:
    - description: "Classic butterfly with standard parameters"
      params: {sigma: 10.0, rho: 28.0, beta: 2.667}
    - description: "Wider butterfly wings with higher Rayleigh number"
      params: {sigma: 10.0, rho: 45.0, beta: 2.667}
    - description: "Tighter spiral with lower sigma"
      params: {sigma: 6.0, rho: 28.0, beta: 2.667}

rossler:
  math_description: >
    The Rössler attractor is a three-parameter ODE system producing a
    single-scroll shape that resembles a folded band. It was designed to
    exhibit the simplest possible chaotic behavior.
  seed_behavior: seed-dependent
  examples:
    - description: "Classic single fold band"
      params: {a: 0.2, b: 0.2, c: 5.7}
    - description: "Funnel-shaped with higher c"
      params: {a: 0.2, b: 0.2, c: 18.0}

sprott:
  math_description: >
    Sprott's minimal chaotic flows are a family of simple 3D ODE systems,
    each with the fewest possible terms to produce chaos. Different variants
    (sprott_a through sprott_s) have distinct topologies.
  seed_behavior: seed-dependent
  examples:
    - description: "Sprott case A — simplest chaotic flow"
      params: {system: "sprott_a"}
    - description: "Sprott case B — two-scroll variant"
      params: {system: "sprott_b"}

thomas:
  math_description: >
    The Thomas attractor is a cyclically symmetric system with a single
    dissipation parameter b. As b decreases the system transitions from
    fixed points through limit cycles to chaotic behavior.
  seed_behavior: seed-dependent
  examples:
    - description: "Standard chaotic regime"
      params: {b: 0.208186}
    - description: "Near the edge of chaos — more regular loops"
      params: {b: 0.18}

# ── Curves ──────────────────────────────────────────────────────────────

cardioid:
  math_description: >
    A cardioid is a heart-shaped curve traced by a point on a circle rolling
    around a fixed circle of equal radius. Here it is extended into 3D with
    a configurable z-height.
  seed_behavior: deterministic
  examples:
    - description: "Flat heart shape"
      params: {radius: 1.0, height: 0.0}
    - description: "Tall helix-like cardioid"
      params: {radius: 1.0, height: 1.5}

fibonacci_spiral:
  math_description: >
    A golden-ratio spiral whose radius grows exponentially with the golden
    ratio φ ≈ 1.618. It is the spiral found in sunflower seed heads,
    nautilus shells, and galaxy arms.
  seed_behavior: deterministic
  examples:
    - description: "Tight spiral with many turns"
      params: {turns: 8.0, height: 0.2, scale: 1.0}
    - description: "Wide 3D helix"
      params: {turns: 3.0, height: 2.0, scale: 1.0}

hilbert_3d:
  math_description: >
    The 3D Hilbert curve is a space-filling curve that visits every cell in
    an N×N×N grid exactly once. Higher orders fill space more densely,
    producing a complex self-similar labyrinth.
  performance_notes: "Vertex count is 8^order; order 5 = 32768 vertices"
  seed_behavior: deterministic
  examples:
    - description: "Low-order curve showing basic structure"
      params: {order: 2, size: 1.0}
    - description: "Dense space-filling at order 5"
      params: {order: 5, size: 1.0}

lissajous_curve:
  math_description: >
    A 3D Lissajous curve is the trajectory of a point whose x, y, z
    coordinates oscillate sinusoidally at different frequencies and phases.
    Integer frequency ratios produce closed curves.
  seed_behavior: deterministic
  examples:
    - description: "Classic figure-8 projection"
      params: {nx: 2, ny: 3, nz: 1, phase_x: 0.0, phase_y: 0.5, phase_z: 0.0}
    - description: "Complex 3D knot-like path"
      params: {nx: 3, ny: 5, nz: 7, phase_x: 0.0, phase_y: 0.3, phase_z: 0.7}

logarithmic_spiral:
  math_description: >
    A logarithmic (equiangular) spiral whose radius grows exponentially,
    extended into 3D with a rising z component. Appears widely in nature
    from shells to hurricanes.
  seed_behavior: deterministic
  examples:
    - description: "Tight fast-growing spiral"
      params: {growth_rate: 0.3, turns: 2.0, height: 0.5}
    - description: "Gentle long spiral"
      params: {growth_rate: 0.08, turns: 6.0, height: 2.0}

# ── Data-Driven ─────────────────────────────────────────────────────────

building_extrude:
  math_description: >
    Reads GeoJSON building footprint polygons and extrudes them vertically
    to create a 3D cityscape. Height comes from a property field or a
    configurable default.
  seed_behavior: deterministic
  examples:
    - description: "Default extrusion with 1.0 unit height"
      params: {default_height: 1.0, height_property: "height"}

heightmap:
  math_description: >
    Converts a grayscale image or GeoTIFF raster into a 3D relief surface.
    Pixel brightness maps directly to z-height, producing terrain-like
    meshes from any image.
  seed_behavior: deterministic
  examples:
    - description: "Standard height scale"
      params: {height_scale: 1.0, downsample: 1}
    - description: "Exaggerated relief"
      params: {height_scale: 3.0, downsample: 2}

soundwave:
  math_description: >
    Reads a WAV audio file and generates a 3D ribbon representing the
    amplitude envelope over time. The waveform is smoothed and extruded
    along a path.
  seed_behavior: deterministic
  examples:
    - description: "Default amplitude visualization"
      params: {amplitude_scale: 1.0, length: 2.0}

# ── Fractals ────────────────────────────────────────────────────────────

apollonian_3d:
  math_description: >
    The 3D Apollonian gasket fills space with tangent spheres using
    recursive Soddy sphere packing. Each generation fits new spheres
    into the interstices of existing ones, creating a fractal foam.
  performance_notes: "Sphere count grows exponentially with max_depth"
  seed_behavior: deterministic
  examples:
    - description: "Dense packing with small spheres"
      params: {max_depth: 6, min_radius: 0.005}
    - description: "Coarse packing showing structure"
      params: {max_depth: 3, min_radius: 0.05}

burning_ship:
  math_description: >
    The Burning Ship fractal uses absolute-value versions of the
    Mandelbrot iteration, producing a shape reminiscent of a burning
    galleon. Rendered as a heightmap with escape-time values as z-height.
  seed_behavior: deterministic
  examples:
    - description: "Full overview of the ship"
      params: {center_x: -0.4, center_y: -0.6, zoom: 3.0}
    - description: "Zoomed into the bow detail"
      params: {center_x: -1.76, center_y: -0.028, zoom: 0.05}

fractal_slice:
  math_description: >
    Takes a 2D cross-section through a 3D Mandelbulb, producing a heightmap
    of escape-time values. Different slice positions and axes reveal
    different internal symmetries of the fractal.
  seed_behavior: deterministic
  examples:
    - description: "Equatorial cross-section"
      params: {slice_axis: "z", slice_position: 0.0, power: 8.0}
    - description: "Off-center slice showing asymmetry"
      params: {slice_axis: "y", slice_position: 0.5, power: 8.0}

ifs_fractal:
  math_description: >
    Iterated Function System fractals are generated by randomly applying
    affine transformations to a point (the "chaos game"). Different
    presets produce ferns, spirals, leaves, and other organic shapes.
  performance_notes: "O(num_points) — linear in iteration count"
  seed_behavior: seed-dependent
  examples:
    - description: "Classic Barnsley fern"
      params: {preset: "barnsley_fern", dimensions: "3d"}
    - description: "Spiral IFS pattern"
      params: {preset: "spiral", dimensions: "3d"}

julia3d:
  math_description: >
    The 3D Julia set extends the classical complex Julia set into
    three dimensions using a triplex number iteration. The resulting
    fractal has bulbous, coral-like morphology.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Coral-like default Julia set"
      params: {power: 8.0, c_re: -0.2, c_im: 0.6, c_z: 0.2}
    - description: "Spikier variant with lower power"
      params: {power: 4.0, c_re: -0.4, c_im: 0.6, c_z: 0.0}

koch_3d:
  math_description: >
    The Koch snowflake is a classic fractal curve built by recursively adding
    triangular bumps to each edge. Here it is extended to 3D by extrusion
    or revolution around its center.
  seed_behavior: deterministic
  examples:
    - description: "Extruded snowflake"
      params: {level: 4, mode: "extrude", height: 0.3}
    - description: "Revolved snowflake — vase-like shape"
      params: {level: 3, mode: "revolve", height: 0.3}

mandelbrot_heightmap:
  math_description: >
    The Mandelbrot set boundary rendered as a 3D heightmap where escape
    iteration count maps to z-height. Smooth coloring via fractional
    escape produces continuous terrain.
  seed_behavior: deterministic
  examples:
    - description: "Full set overview"
      params: {center_real: -0.5, center_imag: 0.0, zoom: 1.0}
    - description: "Seahorse valley zoom"
      params: {center_real: -0.745, center_imag: 0.186, zoom: 0.01}

mandelbulb:
  math_description: >
    The Mandelbulb is the best-known 3D generalization of the Mandelbrot
    set, using a spherical coordinate power formula. The power parameter
    controls the number of bulbs — power 8 is the classic shape.
  performance_notes: "O(N³) in voxel_resolution — 128³ ≈ 2M voxels"
  seed_behavior: deterministic
  examples:
    - description: "Classic power-8 Mandelbulb"
      params: {power: 8.0, max_iterations: 10}
    - description: "Smoother low-power blob"
      params: {power: 3.0, max_iterations: 15}
    - description: "High detail with more iterations"
      params: {power: 8.0, max_iterations: 25}

menger_sponge:
  math_description: >
    The Menger sponge is built by recursively removing the center and
    face-centers of each cube. Each level multiplies the cube count by 20,
    converging to a fractal of Hausdorff dimension ≈ 2.727.
  performance_notes: "Cube count is 20^level; level 4 = 160,000 cubes"
  seed_behavior: deterministic
  examples:
    - description: "Standard level 3 sponge"
      params: {level: 3, size: 1.0}
    - description: "High-detail level 4"
      params: {level: 4, size: 1.0}

quaternion_julia:
  math_description: >
    The quaternion Julia set extends Julia fractals to four dimensions
    using quaternion multiplication, then slices back to 3D. The four
    c-components control the shape's morphology.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Smooth organic blob"
      params: {c_real: -0.2, c_i: 0.8, c_j: 0.0, c_k: 0.0}
    - description: "Spiny variant"
      params: {c_real: -0.4, c_i: 0.6, c_j: 0.2, c_k: -0.1}

sierpinski_tetrahedron:
  math_description: >
    The Sierpinski tetrahedron (tetrix) is built by recursively placing
    four half-scale copies at each corner of a tetrahedron. It has
    Hausdorff dimension 2 and a striking triangular fractal structure.
  performance_notes: "Tetrahedron count is 4^level; level 7 = 16,384"
  seed_behavior: deterministic
  examples:
    - description: "Standard tetrix"
      params: {level: 5, size: 1.0}
    - description: "High detail"
      params: {level: 7, size: 1.0}

# ── Geometry ────────────────────────────────────────────────────────────

gear:
  math_description: >
    An involute spur or helical gear generated from mechanical parameters.
    The tooth profile follows the involute of a circle, the standard
    form used in mechanical engineering.
  seed_behavior: deterministic
  examples:
    - description: "Standard 20-tooth spur gear"
      params: {num_teeth: 20, module: 1.0, pressure_angle: 20.0, face_width: 0.5}
    - description: "Helical gear with 30° helix angle"
      params: {num_teeth: 24, module: 0.8, helix_angle: 30.0, face_width: 0.8}

generic_parametric:
  math_description: >
    A parametric surface defined by user-supplied mathematical expressions
    for x(u,v), y(u,v), z(u,v). Supports standard math functions like
    sin, cos, exp. Defaults to a torus shape.
  seed_behavior: deterministic
  examples:
    - description: "Sphere from parametric equations"
      params:
        x_expr: "sin(u) * cos(v)"
        y_expr: "sin(u) * sin(v)"
        z_expr: "cos(u)"
        u_range: [0.0, 3.14159]
        v_range: [0.0, 6.28318]
        wrap_u: false
        wrap_v: true

geodesic_sphere:
  math_description: >
    A geodesic sphere created by subdividing an icosahedron and projecting
    vertices onto a sphere. Higher frequency produces more uniform
    triangulation. Dual mode produces a Goldberg polyhedron.
  seed_behavior: deterministic
  examples:
    - description: "Low-poly geodesic sphere"
      params: {frequency: 2, radius: 1.0}
    - description: "Goldberg polyhedron (dual)"
      params: {frequency: 4, radius: 1.0, dual: true}

voronoi_3d:
  math_description: >
    3D Voronoi diagram computed from random seed points. The output is
    the wireframe edges of the Voronoi cells, revealing the spatial
    partitioning structure.
  seed_behavior: seed-dependent
  examples:
    - description: "Sparse cells showing large volumes"
      params: {num_points: 10, scale: 1.0}
    - description: "Dense honeycomb-like partition"
      params: {num_points: 50, scale: 1.0}

voronoi_sphere:
  math_description: >
    Voronoi tessellation computed on the surface of a sphere using
    geodesic distances. Produces polygonal cells covering the sphere,
    similar to organic bubble patterns.
  seed_behavior: seed-dependent
  examples:
    - description: "Coarse cells on a sphere"
      params: {num_cells: 12}
    - description: "Fine tessellation"
      params: {num_cells: 128}

weaire_phelan:
  math_description: >
    The Weaire-Phelan structure is the best known solution to the Kelvin
    problem of partitioning space into equal-volume cells with minimal
    surface area. It uses two cell types: dodecahedra and tetrakaidecahedra.
  seed_behavior: deterministic
  examples:
    - description: "Single unit cell"
      params: {}

# ── Implicit Surfaces ──────────────────────────────────────────────────

genus2_surface:
  math_description: >
    An implicit surface of genus 2 (a surface with two holes), extracted
    via marching cubes from a polynomial implicit function. The shape
    resembles a pretzel or figure-eight.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Default genus-2 pretzel"
      params: {}

gyroid:
  math_description: >
    The gyroid is a triply periodic minimal surface described by
    sin(x)cos(y) + sin(y)cos(z) + sin(z)cos(x) = 0. It appears in
    butterfly wings, block copolymers, and 3D printing lattices.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Standard gyroid unit cell"
      params: {}

schwarz_d:
  math_description: >
    The Schwarz D (diamond) surface is a triply periodic minimal surface
    with the symmetry of a diamond crystal lattice. It is described by
    cos(x)cos(y)cos(z) − sin(x)sin(y)sin(z) = 0.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Standard Schwarz D"
      params: {}

schwarz_p:
  math_description: >
    The Schwarz P (primitive) surface is the simplest triply periodic
    minimal surface, described by cos(x) + cos(y) + cos(z) = 0. It
    divides space into two congruent labyrinths.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "Standard Schwarz P"
      params: {}

# ── Knots ───────────────────────────────────────────────────────────────

borromean_rings:
  math_description: >
    Three mutually interlocked rings where no two are directly linked —
    cutting any one ring frees the other two. A classic example from
    knot theory and topology.
  seed_behavior: deterministic
  examples:
    - description: "Standard Borromean rings"
      params: {}

chain_links:
  math_description: >
    A chain of interlocked torus-shaped links, like a physical chain.
    Each link passes through the next, creating a linked sequence.
  seed_behavior: deterministic
  examples:
    - description: "Short chain of 3 links"
      params: {}

cinquefoil_knot:
  math_description: >
    The cinquefoil (5₁) knot is a (5,2) torus knot that winds five times
    around a torus while circling twice through the hole. It has five
    crossings and is the second-simplest prime knot after the trefoil.
  seed_behavior: deterministic
  examples:
    - description: "Standard cinquefoil"
      params: {}

figure_eight_knot:
  math_description: >
    The figure-eight knot (4₁) is the simplest non-torus prime knot,
    with four crossings. Its shape traces a path reminiscent of the
    digit 8 viewed at an angle.
  seed_behavior: deterministic
  examples:
    - description: "Classic figure-eight knot"
      params: {}

lissajous_knot:
  math_description: >
    Lissajous knots arise from 3D Lissajous curves with coprime
    frequencies chosen so the curve is knotted. Different frequency
    ratios and phases produce different knot types.
  seed_behavior: deterministic
  examples:
    - description: "Simple Lissajous knot"
      params: {nx: 2, ny: 3, nz: 5}

pretzel_knot:
  math_description: >
    A torus knot with configurable (p, q) winding numbers. Setting p > q
    creates wider pretzel-like shapes with multiple lobes wrapping around
    the torus.
  seed_behavior: deterministic
  examples:
    - description: "Wide pretzel shape"
      params: {p: 11, q: 1}
    - description: "Trefoil-like winding"
      params: {p: 2, q: 3}

seven_crossing_knots:
  math_description: >
    The seven-crossing knots are the prime knots with exactly seven
    crossings. There are seven such knots (7₁ through 7₇), selectable
    by index.
  seed_behavior: deterministic
  examples:
    - description: "First seven-crossing knot (7₁)"
      params: {knot_index: 1}
    - description: "Seventh variant (7₇)"
      params: {knot_index: 7}

torus_knot:
  math_description: >
    A torus knot winds p times around a torus while circling q times
    through the hole. The (2,3) torus knot is the trefoil; (2,5) is
    the cinquefoil. Coprime p,q always produce a single-component knot.
  seed_behavior: deterministic
  examples:
    - description: "Trefoil knot (2,3)"
      params: {p: 2, q: 3}
    - description: "Solomon's seal knot (2,5)"
      params: {p: 2, q: 5}
    - description: "Wide (3,7) torus knot"
      params: {p: 3, q: 7, R: 1.0, r: 0.3}

trefoil_on_torus:
  math_description: >
    The (2,3) trefoil knot displayed on its embedding torus, with the
    torus surface shown as a wireframe. This illustrates why it is
    called a "torus knot."
  seed_behavior: deterministic
  examples:
    - description: "Default trefoil on torus"
      params: {torus_R: 1.0, torus_r: 0.4}

# ── Number Theory ───────────────────────────────────────────────────────

digit_encoding:
  math_description: >
    Digits of mathematical constants (π, e, φ, etc.) encoded as a 3D
    point sequence where each digit's value becomes the z-height. Reveals
    patterns (or their absence) in digit sequences.
  seed_behavior: deterministic
  examples:
    - description: "First 200 digits of π"
      params: {constant: "pi", num_digits: 200}
    - description: "Digits of e with tall bars"
      params: {constant: "e", height_scale: 0.3}

prime_gaps:
  math_description: >
    Visualizes the gaps between consecutive prime numbers as a 3D ribbon.
    The x-axis is the prime index, y-height is the gap size, and the
    ribbon width adds visual weight.
  seed_behavior: deterministic
  examples:
    - description: "First 500 prime gaps"
      params: {x_spacing: 0.1, y_scale: 0.1, ribbon_width: 0.5}
    - description: "Dense view of 1000 gaps"
      params: {x_spacing: 0.05, y_scale: 0.05, ribbon_width: 0.3}

sacks_spiral:
  math_description: >
    The Sacks spiral places integers on an Archimedean spiral with
    perfect squares at the cardinal directions. Prime numbers are
    elevated in z, revealing diagonal patterns in prime distribution.
  seed_behavior: deterministic
  examples:
    - description: "Standard Sacks spiral"
      params: {prime_height: 1.0, scale: 0.1}

ulam_spiral:
  math_description: >
    The Ulam spiral arranges integers in a square spiral and elevates
    primes in z. Diagonal lines of primes emerge, corresponding to
    prime-rich quadratic polynomials.
  seed_behavior: deterministic
  examples:
    - description: "Standard Ulam spiral"
      params: {prime_height: 1.0, spacing: 0.1}

# ── Parametric Surfaces ────────────────────────────────────────────────

bour_surface:
  math_description: >
    Bour's minimal surface is a one-parameter family that interpolates
    between a helicoid (n=1) and shapes with increasing numbers of
    petal-like folds. Higher n produces flower-like geometry.
  seed_behavior: deterministic
  examples:
    - description: "Two-petal Bour surface"
      params: {n: 2, r_max: 1.0}
    - description: "Five-petal flower"
      params: {n: 5, r_max: 0.8}

boy_surface:
  math_description: >
    Boy's surface is a non-orientable surface — an immersion of the real
    projective plane RP² in 3D. It has a single triple self-intersection
    point and 3-fold symmetry.
  seed_behavior: deterministic
  examples:
    - description: "Standard Boy surface"
      params: {scale: 1.0}

calabi_yau:
  math_description: >
    A cross-section of a Calabi-Yau manifold, the compact spaces from
    string theory. Defined by z₁ⁿ + z₂ⁿ = 1 in C², producing
    crystalline flower-like shapes with n-fold symmetry.
  seed_behavior: deterministic
  examples:
    - description: "5-fold Calabi-Yau (default)"
      params: {n: 5}
    - description: "3-fold with wider cross-section"
      params: {n: 3, alpha: 1.0}

costa_surface:
  math_description: >
    The Costa minimal surface is a complete embedded minimal surface
    of genus 1 with three ends, discovered in 1984. It resembles a
    saddle pierced by a tube.
  seed_behavior: deterministic
  examples:
    - description: "Standard Costa surface"
      params: {scale: 0.1}

cross_cap:
  math_description: >
    The cross-cap is another immersion of the real projective plane
    RP² in 3D. Unlike Boy's surface, it has a line of self-intersection
    rather than a triple point.
  seed_behavior: deterministic
  examples:
    - description: "Standard cross-cap"
      params: {scale: 1.0}

dini_surface:
  math_description: >
    Dini's surface is a pseudospherical surface with constant negative
    Gaussian curvature, resembling a twisted seashell. It is generated
    by twisting a tractrix around an axis.
  seed_behavior: deterministic
  examples:
    - description: "Tight seashell with 2 turns"
      params: {a: 1.0, b: 0.2, turns: 2}
    - description: "Long twisted horn with 6 turns"
      params: {a: 1.0, b: 0.1, turns: 6}

dna_helix:
  math_description: >
    A DNA double helix with two intertwined backbone curves and
    connecting base-pair rungs. Parameters control the pitch, radius,
    and number of base pairs per turn.
  seed_behavior: deterministic
  examples:
    - description: "Standard B-DNA proportions"
      params: {turns: 3, radius: 1.0, rise_per_turn: 3.4, base_pairs_per_turn: 10}
    - description: "Compact helix with more turns"
      params: {turns: 6, radius: 0.8, rise_per_turn: 2.5}

dupin_cyclide:
  math_description: >
    A Dupin cyclide is a surface that generalizes torus, cylinder, and
    cone shapes through inversive geometry. It is an envelope of a
    one-parameter family of spheres.
  seed_behavior: deterministic
  examples:
    - description: "Nearly toroidal cyclide"
      params: {a: 1.0, b: 0.8, c: 0.5, d: 0.6}
    - description: "Horn-like deformation"
      params: {a: 2.0, b: 1.5, c: 0.3, d: 1.0}

enneper_surface:
  math_description: >
    Enneper's minimal surface is a self-intersecting surface with zero
    mean curvature. Higher orders produce more complex saddle-like
    shapes with additional lobes.
  seed_behavior: deterministic
  examples:
    - description: "Standard first-order Enneper"
      params: {range: 2.0, order: 1}
    - description: "Second-order with 4-fold symmetry"
      params: {range: 1.5, order: 2}

hopf_fibration:
  math_description: >
    The Hopf fibration maps circles on S² to linked fiber curves in
    S³, then projects to R³ via stereographic projection. Each fiber
    is a circle, and fibers from nearby base points are linked.
  seed_behavior: deterministic
  examples:
    - description: "Standard fibration with 5 base circles"
      params: {num_fibers: 32, num_circles: 5}
    - description: "Dense fibration with many fibers"
      params: {num_fibers: 64, num_circles: 8}

klein_bottle:
  math_description: >
    The Klein bottle is a non-orientable surface with no boundary —
    like a Möbius strip closed into a tube. It cannot be embedded in
    3D without self-intersection.
  seed_behavior: deterministic
  examples:
    - description: "Standard Klein bottle"
      params: {scale: 1.0}

linked_tori:
  math_description: >
    Multiple tori arranged in an interlocking chain, like links of a
    chain. Each torus passes through the next, creating a linked
    topological structure.
  seed_behavior: deterministic
  examples:
    - description: "Two linked tori"
      params: {num_tori: 2, major_radius: 1.0, minor_radius: 0.3}
    - description: "Chain of 5 links"
      params: {num_tori: 5, major_radius: 0.8, minor_radius: 0.2, link_spacing: 1.2}

lissajous_surface:
  math_description: >
    A tubular surface wrapped around a 3D Lissajous curve. The
    frequencies and phases of the underlying curve control the
    knot-like topology of the resulting tube.
  seed_behavior: deterministic
  examples:
    - description: "Default Lissajous tube"
      params: {nx: 2, ny: 3, nz: 5, tube_radius: 0.1}
    - description: "Thicker tube with different frequencies"
      params: {nx: 3, ny: 4, nz: 7, tube_radius: 0.15}

mobius_strip:
  math_description: >
    The Möbius strip is a non-orientable surface with only one side
    and one boundary curve, formed by giving a rectangular strip a
    half-twist and joining the ends.
  seed_behavior: deterministic
  examples:
    - description: "Standard Möbius strip"
      params: {radius: 1.0, half_width: 0.4}
    - description: "Wide strip"
      params: {radius: 1.0, half_width: 0.8}

mobius_trefoil:
  math_description: >
    A Möbius strip whose centerline follows a trefoil knot instead of
    a circle. This combines the non-orientability of the Möbius strip
    with the knotted topology of the trefoil.
  seed_behavior: deterministic
  examples:
    - description: "Narrow Möbius trefoil"
      params: {width: 0.2}
    - description: "Wide Möbius trefoil"
      params: {width: 0.5}

roman_surface:
  math_description: >
    Steiner's Roman surface is a self-intersecting immersion of RP² in
    3D with tetrahedral symmetry. It has three lines of self-intersection
    meeting at a triple point.
  seed_behavior: deterministic
  examples:
    - description: "Standard Roman surface"
      params: {scale: 1.0}

rose_surface:
  math_description: >
    A rhodonea (rose) curve pattern applied to a sphere, where the
    radius modulation r = cos(k₁θ)·cos(k₂φ) creates flower-like
    petal arrangements in 3D.
  seed_behavior: deterministic
  examples:
    - description: "Six-petal rose (3,2)"
      params: {k1: 3, k2: 2}
    - description: "Complex 12-petal pattern"
      params: {k1: 6, k2: 4}

seifert_surface:
  math_description: >
    A Seifert surface is an orientable surface bounded by a knot. It
    provides a way to "fill in" a knot with a surface, useful for
    computing knot invariants.
  seed_behavior: deterministic
  examples:
    - description: "Seifert surface for trefoil"
      params: {knot_type: "trefoil", theta: 0.0}

shell_spiral:
  math_description: >
    A logarithmic spiral with an exponentially expanding cross-section,
    producing a nautilus-like seashell form. Growth rate and opening
    rate control the shell proportions.
  seed_behavior: deterministic
  examples:
    - description: "Classic nautilus shell"
      params: {growth_rate: 0.1, turns: 3, opening_rate: 0.08}
    - description: "Tall conical shell"
      params: {growth_rate: 0.2, turns: 5, opening_rate: 0.15, ellipticity: 2.0}

spherical_harmonics:
  math_description: >
    A sphere whose radius is modulated by real spherical harmonics Y_l^m.
    The l and m quantum numbers control the angular frequency and
    symmetry of the surface deformation.
  seed_behavior: deterministic
  examples:
    - description: "Pure sphere (l=0, m=0)"
      params: {l: 0, m: 0, amplitude: 0.3}
    - description: "Peanut shape (l=2, m=0)"
      params: {l: 2, m: 0, amplitude: 0.5}
    - description: "Four-lobed clover (l=2, m=2)"
      params: {l: 2, m: 2, amplitude: 0.5}

superellipsoid:
  math_description: >
    A superellipsoid generalizes the ellipsoid by allowing independent
    exponents for the two parametric directions. Exponents < 1 produce
    pinched shapes; > 1 produces rounded cubes.
  seed_behavior: deterministic
  examples:
    - description: "Rounded cube (e1=0.3, e2=0.3)"
      params: {e1: 0.3, e2: 0.3}
    - description: "Pinched pillow (e1=2.0, e2=0.5)"
      params: {e1: 2.0, e2: 0.5}

torus:
  math_description: >
    The torus is the product of two circles — a donut shape defined
    by its major radius (center to tube center) and minor radius
    (tube thickness). The simplest non-trivial surface of revolution.
  seed_behavior: deterministic
  examples:
    - description: "Standard donut"
      params: {major_radius: 1.0, minor_radius: 0.4}
    - description: "Thin ring"
      params: {major_radius: 2.0, minor_radius: 0.1}
    - description: "Fat torus approaching sphere"
      params: {major_radius: 1.0, minor_radius: 0.9}

twisted_torus:
  math_description: >
    A torus whose cross-section rotates by N half-twists as it goes
    around the loop. twist=1 gives a Möbius-torus (single-sided);
    twist=2 gives a full-twist torus; higher values create braided forms.
  seed_behavior: deterministic
  examples:
    - description: "Möbius-torus (1 half-twist)"
      params: {twist: 1, major_radius: 1.0, minor_radius: 0.3}
    - description: "Triple-twist torus"
      params: {twist: 3, major_radius: 1.0, minor_radius: 0.3}

# ── Physics ─────────────────────────────────────────────────────────────

electron_orbital:
  math_description: >
    Isosurface of the hydrogen atom electron probability density |ψ|²
    for quantum numbers (n, l, m). Different orbitals produce spherical,
    dumbbell, and clover-shaped surfaces.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "d-orbital (n=3, l=2, m=0)"
      params: {n: 3, l: 2, m: 0, iso_level: 0.01}
    - description: "p-orbital dumbbell (n=2, l=1, m=0)"
      params: {n: 2, l: 1, m: 0, iso_level: 0.01}

gravitational_lensing:
  math_description: >
    A coordinate grid warped by Schwarzschild spacetime curvature around
    a point mass. Grid lines bend near the mass, illustrating
    gravitational lensing from general relativity.
  seed_behavior: deterministic
  examples:
    - description: "Moderate lensing"
      params: {mass: 1.0, grid_lines: 20}
    - description: "Strong lensing"
      params: {mass: 3.0, grid_lines: 30}

kepler_orbit:
  math_description: >
    An elliptical orbit computed from classical Keplerian orbital elements.
    The semi-major axis and eccentricity define the orbit shape;
    inclination tilts it out of the xy-plane.
  seed_behavior: deterministic
  examples:
    - description: "Circular orbit"
      params: {semi_major_axis: 1.0, eccentricity: 0.0}
    - description: "Highly eccentric comet-like orbit"
      params: {semi_major_axis: 2.0, eccentricity: 0.9, inclination: 0.5}

magnetic_field:
  math_description: >
    3D magnetic field lines for dipole or quadrupole configurations.
    Lines are traced by integrating the field direction from seed points
    distributed around the origin.
  seed_behavior: deterministic
  examples:
    - description: "Dipole field (bar magnet)"
      params: {field_type: "dipole", num_lines: 24}
    - description: "Quadrupole field"
      params: {field_type: "quadrupole", num_lines: 32}

nbody:
  math_description: >
    Gravitational N-body simulation where bodies interact via Newtonian
    gravity. Initial positions and velocities are generated from the seed,
    producing unique chaotic trajectories.
  performance_notes: "O(N² × integration_steps) where N is num_bodies"
  seed_behavior: seed-dependent
  examples:
    - description: "Three-body dance"
      params: {num_bodies: 3, time_span: 10.0}
    - description: "Five-body swarm"
      params: {num_bodies: 5, time_span: 15.0}

planetary_positions:
  math_description: >
    Solar system planet orbits and positions computed from Keplerian
    elements at a given Julian date epoch. Shows the eight planets
    and their orbital paths.
  seed_behavior: deterministic
  examples:
    - description: "J2000 epoch (2000-01-01)"
      params: {epoch_jd: 2451545.0}

wave_interference:
  math_description: >
    Standing wave interference pattern from multiple point sources.
    The superposition of spherical waves creates an isosurface with
    complex nodal patterns.
  performance_notes: "O(N³) in voxel_resolution"
  seed_behavior: deterministic
  examples:
    - description: "3-source interference"
      params: {num_sources: 3, wavelength: 0.5}
    - description: "Dense pattern with short wavelength"
      params: {num_sources: 4, wavelength: 0.3, iso_level: 0.4}

# ── Procedural ──────────────────────────────────────────────────────────

lsystem:
  math_description: >
    L-system (Lindenmayer system) fractals generated by iteratively
    rewriting a string with production rules, then interpreting the
    result as turtle graphics commands in 3D.
  seed_behavior: seed-dependent
  examples:
    - description: "Fractal tree"
      params: {preset: "tree", iterations: 5, angle: 25.0}
    - description: "Bush with wider branching"
      params: {preset: "bush", iterations: 4, angle: 30.0}

noise_surface:
  math_description: >
    A heightmap surface generated from simplex noise. The frequency
    controls the scale of features and height_scale controls the
    vertical exaggeration.
  seed_behavior: seed-dependent
  examples:
    - description: "Gentle rolling hills"
      params: {frequency: 2.0, height_scale: 0.5}
    - description: "Rough terrain"
      params: {frequency: 8.0, height_scale: 1.5}

penrose_3d:
  math_description: >
    A Penrose P3 aperiodic tiling extruded into 3D. The tiling uses
    fat and thin rhombuses arranged with 5-fold symmetry, defying
    periodic repetition.
  seed_behavior: deterministic
  examples:
    - description: "Standard Penrose tiling relief"
      params: {generations: 5, tile_height_ratio: 0.3}
    - description: "Taller extrusion"
      params: {generations: 4, tile_height_ratio: 0.8}

rd_surface:
  math_description: >
    Gray-Scott reaction-diffusion simulation on a curved surface mesh.
    Chemical patterns (spots, stripes, labyrinthine) form on the surface,
    then displace it to create textured geometry.
  performance_notes: "O(iterations × grid_resolution²)"
  seed_behavior: seed-dependent
  examples:
    - description: "Spots on a torus"
      params: {base_surface: "torus", feed_rate: 0.055, kill_rate: 0.062}
    - description: "Stripes on a sphere"
      params: {base_surface: "sphere", feed_rate: 0.04, kill_rate: 0.06}

reaction_diffusion:
  math_description: >
    Gray-Scott reaction-diffusion simulation on a flat grid, rendered as
    a heightmap. Feed and kill rates control the pattern type: spots,
    stripes, or labyrinthine structures.
  performance_notes: "O(timesteps × grid_size²)"
  seed_behavior: seed-dependent
  examples:
    - description: "Spot pattern"
      params: {feed_rate: 0.035, kill_rate: 0.065}
    - description: "Stripe/labyrinthine pattern"
      params: {feed_rate: 0.04, kill_rate: 0.06}

terrain:
  math_description: >
    Multi-octave simplex noise terrain using fractal Brownian motion.
    Multiple noise layers at different frequencies and amplitudes
    are summed to produce realistic mountainous terrain.
  seed_behavior: seed-dependent
  examples:
    - description: "Smooth rolling hills"
      params: {octaves: 3, persistence: 0.4, base_frequency: 2.0}
    - description: "Rugged mountain range"
      params: {octaves: 8, persistence: 0.6, base_frequency: 4.0, height_scale: 1.5}

# ── Surfaces ────────────────────────────────────────────────────────────

parabolic_envelope:
  math_description: >
    A ruled surface formed by the envelope of a family of straight lines.
    The lines are tangent to a parabolic curve, creating a smooth
    curved surface from straight elements.
  seed_behavior: deterministic
  examples:
    - description: "Standard envelope"
      params: {line_count: 32, scale: 1.0, height: 0.5}
    - description: "Dense envelope with many lines"
      params: {line_count: 64, scale: 1.5, height: 0.3}
