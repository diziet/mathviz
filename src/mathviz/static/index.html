<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MathViz Preview</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}

#controls{
  position:absolute;top:12px;right:12px;
  background:rgba(30,30,30,0.85);color:#eee;
  padding:12px 14px;border-radius:8px;font-size:13px;
  display:flex;flex-direction:column;gap:8px;min-width:180px;
  backdrop-filter:blur(6px);
}
#controls.light-bg{background:rgba(240,240,240,0.9);color:#222}
#controls label{display:flex;align-items:center;gap:6px;cursor:pointer}
#controls select,#controls input[type=range]{width:100%}
#controls button{
  padding:4px 10px;border:1px solid #666;border-radius:4px;
  background:transparent;color:inherit;cursor:pointer;font-size:12px;
}
#controls button:hover{background:rgba(128,128,128,0.3)}
#controls button:disabled{opacity:0.4;cursor:default}
#controls button:disabled:hover{background:transparent}
#controls .section-title{font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:0.5px;opacity:0.7;margin-top:2px}

/* Shared input style */
.control-input{
  padding:4px 8px;border:1px solid #555;border-radius:4px;
  background:rgba(0,0,0,0.3);color:inherit;font-size:12px;outline:none;
}
.control-input:focus{border-color:#4488cc}
#controls.light-bg .control-input{background:rgba(255,255,255,0.5);border-color:#aaa}

/* Generator selector */
.generator-selector{position:relative}
#generator-search{width:100%}
#generator-dropdown{
  position:absolute;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;
  background:rgba(30,30,30,0.95);border:1px solid #555;border-radius:4px;
  margin-top:2px;display:none;z-index:100;
}
#controls.light-bg #generator-dropdown{background:rgba(245,245,245,0.97);border-color:#aaa}
.gen-item{
  padding:4px 8px;cursor:pointer;font-size:12px;display:flex;
  justify-content:space-between;align-items:center;
}
.gen-item:hover,.gen-item.active{background:rgba(68,136,204,0.3)}
.gen-item .gen-category{font-size:10px;opacity:0.6;margin-left:8px;white-space:nowrap}

/* Seed control */
.seed-row{display:flex;gap:4px;align-items:center}
#seed-input{flex:1;width:0;min-width:0}
#seed-random-btn{flex-shrink:0;font-size:11px;padding:3px 8px}

#info-panel{
  position:absolute;bottom:12px;left:12px;
  background:rgba(30,30,30,0.85);color:#eee;
  padding:10px 14px;border-radius:8px;font-size:12px;
  backdrop-filter:blur(6px);min-width:200px;
}
#info-panel.light-bg{background:rgba(240,240,240,0.9);color:#222}
#info-panel div{margin:2px 0}

#loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#aaa;font-size:16px;display:none;
  text-align:center;
}
#loading-elapsed{font-size:13px;opacity:0.7;margin-top:4px}
#cancel-btn{
  margin-top:8px;padding:6px 16px;border:1px solid #888;border-radius:4px;
  background:rgba(200,60,60,0.2);color:#ccc;cursor:pointer;font-size:13px;
}
#cancel-btn:hover{background:rgba(200,60,60,0.4)}

/* Left-side controls column (container + params) */
#left-column{
  position:absolute;top:12px;left:12px;
  display:flex;flex-direction:column;gap:10px;
  max-height:calc(100vh - 24px);overflow-y:auto;
  min-width:200px;max-width:260px;
}

/* Container editor panel */
#container-panel{
  background:rgba(30,30,30,0.85);color:#eee;
  padding:12px 14px;border-radius:8px;font-size:13px;
  display:flex;flex-direction:column;gap:8px;min-width:180px;
  backdrop-filter:blur(6px);
}
#container-panel.light-bg{background:rgba(240,240,240,0.9);color:#222}
#container-panel label{display:flex;align-items:center;gap:6px;cursor:pointer}
#container-panel button{
  padding:4px 10px;border:1px solid #666;border-radius:4px;
  background:transparent;color:inherit;cursor:pointer;font-size:12px;
}
#container-panel button:hover{background:rgba(128,128,128,0.3)}
#container-panel .section-title{font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:0.5px;opacity:0.7;margin-top:2px}
#container-panel.light-bg .control-input{background:rgba(255,255,255,0.5);border-color:#aaa}

/* Shared editor row layout */
.editor-row{display:flex;gap:4px;align-items:center}
.editor-row label{flex:0 0 auto;font-size:11px;opacity:0.8}
.editor-row input{flex:1;width:0;min-width:0}
.dim-row label{min-width:28px}
.param-row label{min-width:80px}
#usable-volume{font-size:11px;opacity:0.7;margin-top:2px}
.container-buttons{display:flex;gap:6px}

/* Parameter editor panel */
#param-panel{
  background:rgba(30,30,30,0.85);color:#eee;
  padding:12px 14px;border-radius:8px;font-size:13px;
  display:none;flex-direction:column;gap:8px;min-width:200px;max-width:260px;
  backdrop-filter:blur(6px);
}
#param-panel.light-bg{background:rgba(240,240,240,0.9);color:#222}
#param-panel .section-title{font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:0.5px;opacity:0.7;margin-top:2px}
#param-panel button{
  padding:4px 10px;border:1px solid #666;border-radius:4px;
  background:transparent;color:inherit;cursor:pointer;font-size:12px;
}
#param-panel button:hover{background:rgba(128,128,128,0.3)}
#param-panel.light-bg .control-input{background:rgba(255,255,255,0.5);border-color:#aaa}
/* Save button (bottom-right) */
#save-btn{
  position:absolute;bottom:12px;right:12px;
  padding:8px 18px;border:1px solid #666;border-radius:6px;
  background:rgba(30,30,30,0.85);color:#eee;cursor:pointer;font-size:13px;
  backdrop-filter:blur(6px);z-index:10;
}
#save-btn:hover{background:rgba(68,136,204,0.4)}
#save-btn:disabled{opacity:0.4;cursor:default}
#save-btn:disabled:hover{background:rgba(30,30,30,0.85)}

/* Toast notification */
#save-toast{
  position:absolute;bottom:56px;right:12px;
  padding:8px 16px;border-radius:6px;
  background:rgba(34,139,34,0.9);color:#fff;font-size:13px;
  backdrop-filter:blur(6px);z-index:10;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
#save-toast.visible{opacity:1}

/* Load button (bottom-right, next to Save) */
#load-btn{
  position:absolute;bottom:12px;right:80px;
  padding:8px 18px;border:1px solid #666;border-radius:6px;
  background:rgba(30,30,30,0.85);color:#eee;cursor:pointer;font-size:13px;
  backdrop-filter:blur(6px);z-index:10;
}
#load-btn:hover{background:rgba(68,136,204,0.4)}

/* Snapshot gallery overlay */
#snapshot-gallery{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);z-index:200;
  justify-content:center;align-items:center;
}
#snapshot-gallery.open{display:flex}
#gallery-panel{
  background:#1e1e2e;color:#eee;border-radius:10px;
  width:90%;max-width:720px;max-height:80vh;
  display:flex;flex-direction:column;overflow:hidden;
}
#gallery-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid #333;
}
#gallery-header h2{margin:0;font-size:16px;font-weight:600}
#gallery-close{background:none;border:none;color:#eee;font-size:20px;cursor:pointer}
#gallery-list{
  flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;
}
#gallery-empty{text-align:center;padding:40px;opacity:0.5;font-size:14px}
.snap-card{
  display:flex;gap:12px;padding:10px;border-radius:8px;
  background:rgba(255,255,255,0.05);align-items:center;
}
.snap-card:hover{background:rgba(255,255,255,0.1)}
.snap-thumb{
  width:64px;height:64px;border-radius:4px;object-fit:cover;
  background:#333;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:24px;color:#666;overflow:hidden;
}
.snap-thumb img{width:100%;height:100%;object-fit:cover}
.snap-info{flex:1;min-width:0}
.snap-info .snap-gen{font-weight:600;font-size:13px}
.snap-info .snap-date{font-size:11px;opacity:0.6}
.snap-info .snap-params{font-size:11px;opacity:0.7;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.snap-actions{display:flex;gap:6px;flex-shrink:0}
.snap-actions button{
  padding:4px 10px;border:1px solid #555;border-radius:4px;
  background:transparent;color:#eee;cursor:pointer;font-size:11px;
}
.snap-actions button:hover{background:rgba(128,128,128,0.3)}
.snap-actions .snap-delete:hover{background:rgba(220,50,50,0.4)}

.param-hint{font-size:10px;opacity:0.5;margin-top:2px}
.param-buttons{display:flex;gap:6px}
#param-error{font-size:11px;color:#ff6b6b;display:none;word-break:break-word}
#param-loading{font-size:11px;opacity:0.6;display:none}
.resolution-warning{font-size:10px;color:#ffaa33;margin-top:-4px}
#param-panel label{display:flex;align-items:center;gap:6px;cursor:pointer}

/* Compare mode */
.compare-section{display:flex;gap:4px;align-items:center}
#compare-mode{flex:1}

.panel-label{
  position:absolute;top:4px;left:4px;
  background:rgba(30,30,30,0.7);color:#eee;
  padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;
  pointer-events:none;z-index:10;
}
.panel-overlay{
  position:absolute;bottom:4px;left:4px;
  background:rgba(30,30,30,0.75);color:#eee;
  padding:4px 8px;border-radius:6px;font-size:11px;
  backdrop-filter:blur(4px);z-index:10;cursor:pointer;
  max-width:200px;transition:max-height 0.2s;overflow:hidden;
}
.panel-overlay.light-bg{background:rgba(240,240,240,0.85);color:#222}
.panel-overlay .overlay-summary{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panel-overlay .overlay-editor{display:none;margin-top:4px}
.panel-overlay.expanded .overlay-editor{display:block}
.panel-overlay .overlay-editor .overlay-row{
  display:flex;gap:4px;align-items:center;margin:2px 0;
}
.panel-overlay .overlay-editor .overlay-row label{font-size:10px;min-width:50px;opacity:0.8}
.panel-overlay .overlay-editor .overlay-row input{
  width:60px;padding:2px 4px;border:1px solid #555;border-radius:3px;
  background:rgba(0,0,0,0.3);color:inherit;font-size:10px;outline:none;
}
.panel-overlay .overlay-editor .overlay-row input:focus{border-color:#4488cc}
.panel-overlay.light-bg .overlay-editor .overlay-row input{
  background:rgba(255,255,255,0.5);border-color:#aaa;
}
.panel-overlay .overlay-apply{
  margin-top:4px;padding:2px 6px;border:1px solid #555;border-radius:3px;
  background:transparent;color:inherit;cursor:pointer;font-size:10px;
}
.panel-overlay .overlay-apply:hover{background:rgba(128,128,128,0.3)}
.panel-spinner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#aaa;font-size:12px;display:none;z-index:10;pointer-events:none;
}

/* Cache badge */
#cache-badge{
  display:inline-block;padding:2px 8px;border-radius:4px;
  background:rgba(34,139,34,0.8);color:#fff;font-size:11px;
  font-weight:600;margin-left:8px;opacity:0;transition:opacity 0.3s;
  vertical-align:middle;
}
#cache-badge.visible{opacity:1}

/* Regenerate button */
#regenerate-btn{
  padding:4px 10px;border:1px solid #666;border-radius:4px;
  background:transparent;color:inherit;cursor:pointer;font-size:12px;
}
#regenerate-btn:hover{background:rgba(128,128,128,0.3)}
</style>
</head>
<body>
<div id="canvas-container">
  <div id="loading">
    <div id="loading-text">Generating...</div>
    <div id="loading-elapsed"></div>
    <button id="cancel-btn" type="button">Cancel</button>
  </div>

  <div id="left-column">
    <div id="container-panel">
      <div class="section-title">Dimensions (mm)</div>
      <div class="editor-row dim-row"><label for="dim-w">W</label><input type="number" id="dim-w" class="control-input" value="100" min="1" step="1"></div>
      <div class="editor-row dim-row"><label for="dim-h">H</label><input type="number" id="dim-h" class="control-input" value="100" min="1" step="1"></div>
      <div class="editor-row dim-row"><label for="dim-d">D</label><input type="number" id="dim-d" class="control-input" value="100" min="1" step="1"></div>

      <div class="section-title">Margins (mm)</div>
      <label><input type="checkbox" id="uniform-margin" checked> Uniform</label>
      <div class="editor-row dim-row"><label for="margin-x">X</label><input type="number" id="margin-x" class="control-input" value="5" min="0" step="0.5"></div>
      <div class="editor-row dim-row"><label for="margin-y">Y</label><input type="number" id="margin-y" class="control-input" value="5" min="0" step="0.5"></div>
      <div class="editor-row dim-row"><label for="margin-z">Z</label><input type="number" id="margin-z" class="control-input" value="5" min="0" step="0.5"></div>

      <div id="usable-volume">Usable: — x — x — mm</div>

      <div class="container-buttons">
        <button id="container-apply-btn">Apply</button>
        <button id="container-reset-btn">Reset</button>
      </div>
    </div>

    <div id="param-panel">
      <div class="section-title">Parameters</div>
      <label><input type="checkbox" id="auto-apply"> Auto-Apply</label>
      <div id="param-fields"></div>
      <div id="param-resolution-section" style="display:none">
        <div class="section-title">Resolution</div>
        <div id="param-resolution-fields"></div>
      </div>
      <div id="param-error"></div>
      <div id="param-loading">Generating...</div>
      <div class="param-buttons">
        <button id="param-apply-btn">Apply</button>
        <button id="param-reset-btn">Reset</button>
        <button id="param-randomize-btn" title="Randomize parameters (R)">&#x1F3B2;</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="section-title">Generator</div>
    <div class="generator-selector">
      <input type="text" id="generator-search" class="control-input" placeholder="Search generators..." autocomplete="off">
      <div id="generator-dropdown"></div>
    </div>

    <div class="section-title">Seed</div>
    <div class="seed-row">
      <input type="number" id="seed-input" class="control-input" value="42" min="0" step="1">
      <button id="seed-random-btn">Random</button>
    </div>

    <div class="section-title">View Mode</div>
    <select id="view-mode">
      <option value="shaded">Shaded Mesh</option>
      <option value="wireframe">Wireframe</option>
      <option value="points" selected>Point Cloud</option>
      <option value="crystal">Crystal Preview</option>
    </select>

    <div class="section-title">Point Size</div>
    <input type="range" id="point-size" min="0.5" max="10" step="0.5" value="2">

    <div class="section-title">Options</div>
    <label><input type="checkbox" id="show-bbox" checked> Bounding Box</label>
    <label><input type="checkbox" id="toggle-bg"> Light Background</label>
    <button id="lock-camera" data-mode="render" title="Camera: Locked (movable)">&#x1f512; Render Lock</button>

    <div id="crystal-controls" style="display:none">
      <div class="section-title">Crystal Settings</div>
      <label>Glass Tint <input type="color" id="crystal-glass-tint" value="#ffffff"></label>
      <label>Bloom <input type="range" id="crystal-bloom" min="0" max="1" step="0.05" value="0.4"></label>
      <label>Point Brightness <input type="range" id="crystal-brightness" min="0" max="1" step="0.05" value="0.8"></label>
      <label><input type="checkbox" id="crystal-led-base"> LED Base</label>
      <label>LED Color <input type="color" id="crystal-led-color" value="#fff0e0"></label>
    </div>

    <div class="section-title">Compare</div>
    <div class="compare-section">
      <select id="compare-mode">
        <option value="">Single View</option>
        <option value="2x2">2×2 Grid</option>
        <option value="3x3">3×3 Grid</option>
      </select>
    </div>

    <button id="regenerate-btn" title="Force regenerate (bypass cache)">Regenerate</button>
    <button id="reset-view-btn" disabled>Reset View</button>
    <button id="screenshot-btn">Screenshot</button>
  </div>

  <div id="info-panel">
    <div id="info-generator">Generator: —<span id="cache-badge">Cached</span></div>
    <div id="info-vertices">Vertices: —</div>
    <div id="info-faces">Faces: —</div>
    <div id="info-points">Points: —</div>
    <div id="info-fps">FPS: —</div>
  </div>

  <button id="load-btn">Load</button>
  <button id="save-btn" disabled>Save</button>
  <div id="save-toast">Saved!</div>
</div>

<div id="snapshot-gallery">
  <div id="gallery-panel">
    <div id="gallery-header">
      <h2>Saved Snapshots</h2>
      <button id="gallery-close">&times;</button>
    </div>
    <div id="gallery-list">
      <div id="gallery-empty">No saved snapshots yet.</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

/* ── State ── */
const state = {
  meshGroup: null,
  cloudPoints: null,
  bboxHelper: null,
  viewMode: 'points',
  pointSize: 2,
  darkBg: true,
  cameraLocked: 'render',
  generationId: 0,
  autoApply: false,
  geometryId: null,
  generatedWith: null,
  compareMode: null,
  comparePanels: [],
  crystalGlassBlock: null,
  crystalComposer: null,
  crystalLedLight: null,
  crystalActive: false,
  crystalEnvRT: null,
};

const DARK_COLOR = 0x1a1a2e;
const LIGHT_COLOR = 0xf0f0f0;

/* ── Lighting constants ── */
const HEMI_SKY_COLOR = 0x8899cc;
const HEMI_GROUND_COLOR = 0x443322;
const KEY_LIGHT_POSITION = [3, 5, 4];
const FILL_LIGHT_POSITION = [-3, 2, -2];
const RIM_LIGHT_POSITION = [0, 3, -5];
const LIGHT_INTENSITIES = {
  dark: {key: 1.2, fill: 0.4, rim: 0.3, hemi: 0.3, ambient: 0.15},
  light: {key: 0.8, fill: 0.3, rim: 0.2, hemi: 0.2, ambient: 0.1},
};

function createLightingRig(shadowMapSize) {
  const hemi = new THREE.HemisphereLight(HEMI_SKY_COLOR, HEMI_GROUND_COLOR, LIGHT_INTENSITIES.dark.hemi);
  const ambient = new THREE.AmbientLight(0xffffff, LIGHT_INTENSITIES.dark.ambient);
  const key = new THREE.DirectionalLight(0xffffff, LIGHT_INTENSITIES.dark.key);
  key.position.set(...KEY_LIGHT_POSITION);
  key.castShadow = true;
  key.shadow.mapSize.width = shadowMapSize;
  key.shadow.mapSize.height = shadowMapSize;
  key.shadow.camera.near = 0.1;
  key.shadow.camera.far = 50;
  key.shadow.camera.left = -5;
  key.shadow.camera.right = 5;
  key.shadow.camera.top = 5;
  key.shadow.camera.bottom = -5;
  const fill = new THREE.DirectionalLight(0xffffff, LIGHT_INTENSITIES.dark.fill);
  fill.position.set(...FILL_LIGHT_POSITION);
  const rim = new THREE.DirectionalLight(0xffffff, LIGHT_INTENSITIES.dark.rim);
  rim.position.set(...RIM_LIGHT_POSITION);
  return {hemi, ambient, key, fill, rim};
}

function applyLightIntensities(lights, isDark) {
  const vals = isDark ? LIGHT_INTENSITIES.dark : LIGHT_INTENSITIES.light;
  lights.key.intensity = vals.key;
  lights.fill.intensity = vals.fill;
  lights.rim.intensity = vals.rim;
  lights.hemi.intensity = vals.hemi;
  lights.ambient.intensity = vals.ambient;
}

function addLightsToScene(s, lights) {
  s.add(lights.hemi);
  s.add(lights.ambient);
  s.add(lights.key);
  s.add(lights.fill);
  s.add(lights.rim);
}

/* ── Scene setup ── */
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(DARK_COLOR);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.set(2, 1.5, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

/* ── Lighting ── */
const mainLights = createLightingRig(2048);
addLightsToScene(scene, mainLights);

/* ── URL params ── */
function parseQueryParams() {
  const params = new URLSearchParams(window.location.search);
  const result = {generator: null, genParams: {}, seed: 42, file: null};

  for (const [key, value] of params.entries()) {
    if (key === 'generator') result.generator = value;
    else if (key === 'seed') result.seed = parseInt(value, 10) || 42;
    else if (key === 'file') result.file = value;
    else result.genParams[key] = isNaN(Number(value)) ? value : Number(value);
  }
  return result;
}

/* ── PLY parser (binary little-endian) ── */
const PLY_TYPE_SIZES = {
  'char': 1, 'uchar': 1, 'int8': 1, 'uint8': 1,
  'short': 2, 'ushort': 2, 'int16': 2, 'uint16': 2,
  'int': 4, 'uint': 4, 'int32': 4, 'uint32': 4,
  'float': 4, 'float32': 4,
  'double': 8, 'float64': 8,
};

function parseBinaryPLY(buffer) {
  const decoder = new TextDecoder();
  const bytes = new Uint8Array(buffer);

  const headerStr = decoder.decode(bytes.slice(0, Math.min(4096, bytes.length)));
  const headerEndIdx = headerStr.indexOf('end_header\n');
  if (headerEndIdx < 0) return null;
  const headerEnd = headerEndIdx + 'end_header\n'.length;

  const headerLines = headerStr.slice(0, headerEnd).split('\n');
  let vertexCount = 0;
  let inVertexElement = false;
  let vertexStride = 0;

  for (const line of headerLines) {
    const parts = line.trim().split(/\s+/);
    if (parts[0] === 'element') {
      inVertexElement = (parts[1] === 'vertex');
      if (inVertexElement) vertexCount = parseInt(parts[2], 10);
    }
    if (parts[0] === 'property' && inVertexElement) {
      const typeSize = PLY_TYPE_SIZES[parts[1]] || 4;
      vertexStride += typeSize;
    }
  }

  const headerBytes = new TextEncoder().encode(headerStr.slice(0, headerEnd)).length;
  const dataView = new DataView(buffer, headerBytes);
  const positions = new Float32Array(vertexCount * 3);

  for (let i = 0; i < vertexCount; i++) {
    const offset = i * vertexStride;
    positions[i * 3] = dataView.getFloat32(offset, true);
    positions[i * 3 + 1] = dataView.getFloat32(offset + 4, true);
    positions[i * 3 + 2] = dataView.getFloat32(offset + 8, true);
  }

  return {positions, vertexCount};
}

/* ── Geometry loading ── */
const resetViewBtn = document.getElementById('reset-view-btn');

function clearScene() {
  if (state.meshGroup) {scene.remove(state.meshGroup); state.meshGroup = null;}
  if (state.cloudPoints) {scene.remove(state.cloudPoints); state.cloudPoints = null;}
  if (state.bboxHelper) {scene.remove(state.bboxHelper); state.bboxHelper = null;}
  resetViewBtn.disabled = true;
}

function enableResetView() {
  resetViewBtn.disabled = false;
}

function createBBoxHelper() {
  const cp = getContainerParams();
  const hw = cp.width_mm / 2, hh = cp.height_mm / 2, hd = cp.depth_mm / 2;
  const box = new THREE.Box3(
    new THREE.Vector3(-hw, -hh, -hd),
    new THREE.Vector3(hw, hh, hd),
  );
  const helper = new THREE.Box3Helper(box, 0x44aaff);
  helper.visible = document.getElementById('show-bbox').checked;
  return helper;
}

function addBoundingBox(object3d) {
  const helper = createBBoxHelper();
  scene.add(helper);
  state.bboxHelper = helper;
}

function fitCamera(object3d) {
  const box = new THREE.Box3().setFromObject(object3d);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.8;
  camera.position.set(center.x + dist * 0.6, center.y + dist * 0.4, center.z + dist * 0.7);
  camera.near = dist * 0.01;
  camera.far = dist * 10;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.update();
}

/* Update only near/far clipping planes without moving the camera */
function updateClippingPlanes(object3d) {
  const box = new THREE.Box3().setFromObject(object3d);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.8;
  camera.near = dist * 0.01;
  camera.far = dist * 10;
  camera.updateProjectionMatrix();
}

/* Lock-aware camera + bounding box setup for newly loaded geometry */
let _firstRender = true;
function setupCameraForObject(object3d) {
  addBoundingBox(object3d);
  if (state.cameraLocked === 'off' || _firstRender) {
    _firstRender = false;
    fitCamera(object3d);
  } else {
    updateClippingPlanes(object3d);
  }
}

/* Save camera state before clearScene when lock is active */
function saveCameraIfLocked() {
  if (state.cameraLocked === 'off') return null;
  return {
    target: controls.target.clone(),
    position: camera.position.clone(),
  };
}

/* Restore camera state after geometry reload */
function restoreCameraIfSaved(saved) {
  if (!saved) return;
  controls.target.copy(saved.target);
  camera.position.copy(saved.position);
  controls.update();
}

function loadMeshFromGLB(url) {
  return new Promise((resolve, reject) => {
    new GLTFLoader().load(url, (gltf) => {
      const group = new THREE.Group();
      let totalVertices = 0, totalFaces = 0;

      gltf.scene.traverse((child) => {
        if (!child.isMesh) return;
        const geom = child.geometry;
        geom.computeVertexNormals();
        totalVertices += geom.attributes.position.count;
        totalFaces += geom.index ? geom.index.count / 3 : geom.attributes.position.count / 3;

        const shadedMat = new THREE.MeshPhysicalMaterial({
          color: 0x4488cc, metalness: 0.1, roughness: 0.6,
          side: THREE.DoubleSide,
        });
        const wireMat = new THREE.MeshBasicMaterial({
          color: 0x44aaff, wireframe: true,
        });
        const shadedMesh = new THREE.Mesh(geom, shadedMat);
        shadedMesh.name = 'shaded';
        shadedMesh.visible = (state.viewMode === 'shaded');
        shadedMesh.castShadow = true;
        shadedMesh.receiveShadow = true;
        const wireMesh = new THREE.Mesh(geom, wireMat);
        wireMesh.name = 'wireframe';
        wireMesh.visible = (state.viewMode === 'wireframe');

        /* Point cloud from mesh vertices */
        const pointsMat = new THREE.PointsMaterial({color: 0x44ccff, size: state.pointSize * 0.01});
        const pts = new THREE.Points(geom, pointsMat);
        pts.name = 'points';
        pts.visible = (state.viewMode === 'points');

        group.add(shadedMesh, wireMesh, pts);
      });

      resolve({group, totalVertices: Math.round(totalVertices), totalFaces: Math.round(totalFaces)});
    }, undefined, reject);
  });
}

function loadCloudFromPLY(url) {
  return fetch(url).then(r => r.arrayBuffer()).then(buf => {
    const parsed = parseBinaryPLY(buf);
    if (!parsed) throw new Error('Failed to parse PLY');
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(parsed.positions, 3));
    const mat = new THREE.PointsMaterial({color: 0x44ccff, size: state.pointSize * 0.01});
    const points = new THREE.Points(geom, mat);
    return {points, vertexCount: parsed.vertexCount};
  });
}

/* ── Display helpers ── */
async function displayMesh(url, label) {
  const {group, totalVertices, totalFaces} = await loadMeshFromGLB(url);
  state.meshGroup = group;
  scene.add(group);
  setupCameraForObject(group);
  enableResetView();
  updateInfo({generator: label, vertices: totalVertices, faces: totalFaces});
}

function displayCloud(points, vertexCount, label) {
  state.cloudPoints = points;
  scene.add(points);
  if (!state.meshGroup) {
    setupCameraForObject(points);
    document.getElementById('view-mode').value = 'points';
    state.viewMode = 'points';
  }
  enableResetView();
  updateInfo({generator: label, points: vertexCount});
}

/* ── Shared display helper ── */
async function displayGenerateResult(data, generatorName) {
  state.generationId += 1;
  const myGenerationId = state.generationId;

  const savedCamera = saveCameraIfLocked();
  clearScene();
  const hasMesh = Boolean(data.mesh_url);
  const hasCloud = Boolean(data.cloud_url);

  if (hasMesh) {
    await displayMesh(data.mesh_url + '?lod=preview', generatorName);
    if (myGenerationId !== state.generationId) return;
  }
  if (hasCloud) {
    const {points, vertexCount} = await loadCloudFromPLY(data.cloud_url + '?lod=preview');
    if (myGenerationId !== state.generationId) return;
    displayCloud(points, vertexCount, generatorName);
  }

  if (!hasMesh && !hasCloud) {
    applyViewMode();
    return;
  }
  /* Only override view mode when current mode is incompatible with data */
  if (viewModeNeedsMesh() && !hasMesh) {
    state.viewMode = 'points';
  }
  document.getElementById('view-mode').value = state.viewMode;
  restoreCameraIfSaved(savedCamera);
  applyViewMode();
}

/* ── Loading / cancel helpers ── */
let _loadingTimer = null;
let _loadingStart = 0;
let _cancelController = null;

function showLoading(message) {
  const loadingEl = document.getElementById('loading');
  document.getElementById('loading-text').textContent = message || 'Generating...';
  document.getElementById('loading-elapsed').textContent = '';
  loadingEl.style.display = 'block';
  _loadingStart = Date.now();
  _loadingTimer = setInterval(() => {
    const elapsed = Math.round((Date.now() - _loadingStart) / 1000);
    document.getElementById('loading-elapsed').textContent = elapsed + 's';
  }, 1000);
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';
  if (_loadingTimer) { clearInterval(_loadingTimer); _loadingTimer = null; }
  _cancelController = null;
}

function extractErrorMessage(errData, status) {
  if (errData && (errData.error || errData.detail)) return errData.error || errData.detail;
  return 'Generate failed: ' + status;
}

document.getElementById('cancel-btn').addEventListener('click', async () => {
  try {
    await fetch('/api/generate/cancel', {method: 'POST'});
  } catch (_) { /* ignore */ }
  if (_cancelController) _cancelController.abort();
  hideLoading();
  updateInfo({generator: 'Generation cancelled'});
});

/* ── Cache badge ── */
const cacheBadge = document.getElementById('cache-badge');
function showCacheBadge(isHit) {
  if (isHit) {
    cacheBadge.classList.add('visible');
  } else {
    cacheBadge.classList.remove('visible');
  }
}
function updateCacheStatus(resp) {
  showCacheBadge(resp.headers.get('X-Cache') === 'HIT');
}

/* ── Loading workflows ── */
async function loadFromAPI(generator, genParams, seed, force) {
  showLoading(force ? 'Regenerating...' : 'Generating...');
  _cancelController = new AbortController();

  try {
    const body = {generator, params: genParams, seed, container: getContainerParams()};
    if (force) body.force = true;
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
      signal: _cancelController.signal,
    });
    if (!resp.ok) {
      const errData = await resp.json().catch(() => null);
      throw new Error(extractErrorMessage(errData, resp.status));
    }
    updateCacheStatus(resp);
    const data = await resp.json();
    state.geometryId = data.geometry_id;
    state.generatedWith = {generator, params: genParams, seed, container: body.container};
    document.getElementById('save-btn').disabled = false;
    await displayGenerateResult(data, generator);
  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error('Load error:', err);
    updateInfo({generator: generator + ' (error)'});
  } finally {
    hideLoading();
  }
}

async function loadFromFile(filePath) {
  showLoading('Loading file...');

  try {
    const savedCamera = saveCameraIfLocked();
    clearScene();
    const ext = filePath.split('.').pop().toLowerCase();
    const url = '/api/file';

    if (ext === 'stl' || ext === 'glb' || ext === 'gltf') {
      await displayMesh(url, 'file');
      /* Only override if current mode is incompatible — mesh supports all modes */
    } else if (ext === 'ply') {
      const {points, vertexCount} = await loadCloudFromPLY(url);
      displayCloud(points, vertexCount, 'file');
      /* PLY is cloud-only: shaded/wireframe need mesh, so fall back to points */
      if (viewModeNeedsMesh()) {
        state.viewMode = 'points';
      }
    }
    document.getElementById('view-mode').value = state.viewMode;
    restoreCameraIfSaved(savedCamera);
    applyViewMode();
  } catch (err) {
    console.error('File load error:', err);
    updateInfo({generator: 'file (error)'});
  } finally {
    hideLoading();
  }
}

/* ── Crystal mode ── */
function createGlassBlock() {
  const cp = getContainerParams();
  const w = cp.width_mm, h = cp.height_mm, d = cp.depth_mm;
  const geom = new THREE.BoxGeometry(w, h, d);

  /* Generate a simple env map using PMREMGenerator */
  const pmremScene = new THREE.Scene();
  pmremScene.background = new THREE.Color(0x111122);
  const pmremLight = new THREE.AmbientLight(0x444466, 1);
  pmremScene.add(pmremLight);
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileCubemapShader();
  const envRT = pmrem.fromScene(pmremScene, 0.04);
  pmrem.dispose();
  state.crystalEnvRT = envRT;

  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(document.getElementById('crystal-glass-tint').value),
    transmission: 0.95,
    ior: 1.5,
    thickness: 50,
    roughness: 0.02,
    clearcoat: 1.0,
    clearcoatRoughness: 0.05,
    opacity: 1,
    transparent: false,
    envMap: envRT.texture,
    envMapIntensity: 0.5,
    side: THREE.FrontSide,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.name = 'crystal-glass-block';
  mesh.renderOrder = 1;
  return mesh;
}

function createCrystalPointsMaterial() {
  /* Create soft radial gradient sprite texture */
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(232,240,255,0.6)');
  gradient.addColorStop(1, 'rgba(232,240,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const texture = new THREE.CanvasTexture(canvas);

  const brightness = parseFloat(document.getElementById('crystal-brightness').value);
  return new THREE.PointsMaterial({
    color: 0xe8f0ff,
    size: state.pointSize * 0.012,
    map: texture,
    transparent: true,
    opacity: brightness,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });
}

function setupCrystalComposer() {
  const composer = new EffectComposer(renderer);
  const renderPass = new RenderPass(scene, camera);
  composer.addPass(renderPass);

  const bloomStrength = parseFloat(document.getElementById('crystal-bloom').value);
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(container.clientWidth, container.clientHeight),
    bloomStrength, 0.3, 0.6
  );
  bloomPass.name = 'crystal-bloom';
  composer.addPass(bloomPass);
  return composer;
}

function enterCrystalMode() {
  /* Exit compare mode if active — the two modes conflict */
  if (state.compareMode) {
    document.getElementById('compare-mode').value = '';
    exitCompareMode();
  }

  state.crystalActive = true;

  /* Force dark background */
  scene.background = new THREE.Color(0x000000);

  /* Add glass block */
  const glassBlock = createGlassBlock();
  scene.add(glassBlock);
  state.crystalGlassBlock = glassBlock;

  /* Replace point materials with crystal-style soft glow */
  const crystalMat = createCrystalPointsMaterial();
  scene.traverse((child) => {
    if (child.isPoints && child.material) {
      child.userData.originalMaterial = child.material;
      child.material = crystalMat.clone();
      child.visible = true;
    }
  });
  /* Dispose the template material and its texture after cloning */
  if (crystalMat.map) crystalMat.map.dispose();
  crystalMat.dispose();

  /* Hide shaded/wireframe meshes */
  if (state.meshGroup) {
    state.meshGroup.traverse((child) => {
      if (child.name === 'shaded' || child.name === 'wireframe') child.visible = false;
      if (child.name === 'points') child.visible = true;
    });
  }
  if (state.cloudPoints) state.cloudPoints.visible = true;

  /* Setup bloom post-processing */
  state.crystalComposer = setupCrystalComposer();

  /* Show crystal controls */
  document.getElementById('crystal-controls').style.display = 'block';

  /* Handle LED base */
  if (document.getElementById('crystal-led-base').checked) {
    addCrystalLedLight();
  }
}

function exitCrystalMode() {
  state.crystalActive = false;

  /* Restore background based on current darkBg state (not stashed color) */
  scene.background = new THREE.Color(state.darkBg ? DARK_COLOR : LIGHT_COLOR);

  /* Dispose environment map render target */
  if (state.crystalEnvRT) {
    state.crystalEnvRT.dispose();
    state.crystalEnvRT = null;
  }

  /* Remove glass block */
  if (state.crystalGlassBlock) {
    scene.remove(state.crystalGlassBlock);
    state.crystalGlassBlock.geometry.dispose();
    state.crystalGlassBlock.material.dispose();
    state.crystalGlassBlock = null;
  }

  /* Restore original point materials, disposing canvas textures */
  scene.traverse((child) => {
    if (child.isPoints && child.userData.originalMaterial) {
      if (child.material.map) child.material.map.dispose();
      child.material.dispose();
      child.material = child.userData.originalMaterial;
      delete child.userData.originalMaterial;
    }
  });

  /* Remove LED light */
  removeCrystalLedLight();

  /* Remove composer */
  if (state.crystalComposer) {
    state.crystalComposer.dispose();
    state.crystalComposer = null;
  }

  /* Hide crystal controls */
  document.getElementById('crystal-controls').style.display = 'none';
}

function addCrystalLedLight() {
  if (state.crystalLedLight) return;
  const cp = getContainerParams();
  const color = new THREE.Color(document.getElementById('crystal-led-color').value);
  const light = new THREE.PointLight(color, 2, cp.height_mm * 3);
  light.position.set(0, -cp.height_mm / 2 - 5, 0);
  light.name = 'crystal-led-base';
  scene.add(light);
  state.crystalLedLight = light;
}

function removeCrystalLedLight() {
  if (!state.crystalLedLight) return;
  scene.remove(state.crystalLedLight);
  state.crystalLedLight = null;
}

/* ── View mode ── */
function viewModeNeedsMesh() {
  return state.viewMode === 'shaded' || state.viewMode === 'wireframe';
}

function applyViewModeTo(meshGroup, cloudPoints) {
  const mode = state.viewMode;
  if (mode === 'crystal') return; /* crystal mode handles its own visibility */
  if (meshGroup) {
    meshGroup.traverse((child) => {
      if (child.name === 'shaded') child.visible = (mode === 'shaded');
      if (child.name === 'wireframe') child.visible = (mode === 'wireframe');
      if (child.name === 'points') child.visible = (mode === 'points');
    });
  }
  if (cloudPoints) {
    cloudPoints.visible = (mode === 'points') || !meshGroup;
  }
}

function applyViewMode() {
  /* Handle crystal mode transitions */
  if (state.viewMode === 'crystal' && !state.crystalActive) {
    enterCrystalMode();
  } else if (state.viewMode !== 'crystal' && state.crystalActive) {
    exitCrystalMode();
  }
  applyViewModeTo(state.meshGroup, state.cloudPoints);
}

function updatePointSize(size) {
  state.pointSize = size;
  const matSize = size * 0.01;
  scene.traverse((child) => {
    if (child.isPoints && child.material) {
      child.material.size = matSize;
    }
  });
}

/* ── Info panel ── */
const infoState = {generator: '—', vertices: '—', faces: '—', points: '—'};

function updateInfo(updates) {
  Object.assign(infoState, updates);
  document.getElementById('info-generator').textContent = 'Generator: ' + (infoState.generator || '—');
  document.getElementById('info-vertices').textContent = 'Vertices: ' + (infoState.vertices || '—');
  document.getElementById('info-faces').textContent = 'Faces: ' + (infoState.faces || '—');
  document.getElementById('info-points').textContent = 'Points: ' + (infoState.points || '—');
}

/* ── FPS counter ── */
let frameCount = 0, lastFpsTime = performance.now();

function updateFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    document.getElementById('info-fps').textContent = 'FPS: ' + fps;
    frameCount = 0;
    lastFpsTime = now;
  }
}

/* ── Controls wiring ── */
document.getElementById('view-mode').addEventListener('change', (e) => {
  state.viewMode = e.target.value;
  applyViewMode();
  if (state.compareMode) applyViewModeToAllPanels();
});

document.getElementById('point-size').addEventListener('input', (e) => {
  const size = parseFloat(e.target.value);
  updatePointSize(size);
  if (state.compareMode) updatePointSizeInPanels(size);
});

document.getElementById('show-bbox').addEventListener('change', (e) => {
  if (state.bboxHelper) state.bboxHelper.visible = e.target.checked;
  if (state.compareMode) updatePanelBBoxVisibility(e.target.checked);
});

document.getElementById('toggle-bg').addEventListener('change', (e) => {
  const isLight = e.target.checked;
  state.darkBg = !isLight;
  /* Crystal mode forces dark background */
  if (state.crystalActive) {
    scene.background = new THREE.Color(0x000000);
  } else {
    scene.background = new THREE.Color(isLight ? LIGHT_COLOR : DARK_COLOR);
  }
  applyLightIntensities(mainLights, !isLight);
  document.getElementById('controls').classList.toggle('light-bg', isLight);
  document.getElementById('info-panel').classList.toggle('light-bg', isLight);
  document.getElementById('container-panel').classList.toggle('light-bg', isLight);
  document.getElementById('param-panel').classList.toggle('light-bg', isLight);
  if (state.compareMode) updatePanelBackgrounds();
});

document.getElementById('lock-camera').addEventListener('click', () => {
  const cycle = { render: 'full', full: 'off', off: 'render' };
  const labels = {
    render: '\u{1f512} Render Lock',
    full: '\u{1f512} Full Lock',
    off: '\u{1f513} Free',
  };
  const next = cycle[state.cameraLocked] ?? 'render';
  state.cameraLocked = next;
  const btn = document.getElementById('lock-camera');
  btn.dataset.mode = next;
  btn.textContent = labels[next];
  btn.title = next === 'render' ? 'Camera: Locked (movable)'
    : next === 'full' ? 'Camera: Frozen'
    : 'Camera: Free';
  controls.enabled = next !== 'full';
  renderer.domElement.style.cursor = next === 'full' ? 'not-allowed' : '';
});

/* ── Crystal control wiring ── */
document.getElementById('crystal-glass-tint').addEventListener('input', (e) => {
  if (state.crystalGlassBlock) {
    state.crystalGlassBlock.material.color.set(e.target.value);
  }
});

document.getElementById('crystal-bloom').addEventListener('input', (e) => {
  if (state.crystalComposer) {
    const bloomPass = state.crystalComposer.passes.find(p => p.name === 'crystal-bloom');
    if (bloomPass) bloomPass.strength = parseFloat(e.target.value);
  }
});

document.getElementById('crystal-brightness').addEventListener('input', (e) => {
  const brightness = parseFloat(e.target.value);
  scene.traverse((child) => {
    if (child.isPoints && child.material && child.material.blending === THREE.AdditiveBlending) {
      child.material.opacity = brightness;
    }
  });
});

document.getElementById('crystal-led-base').addEventListener('change', (e) => {
  if (!state.crystalActive) return;
  if (e.target.checked) {
    addCrystalLedLight();
  } else {
    removeCrystalLedLight();
  }
});

document.getElementById('crystal-led-color').addEventListener('input', (e) => {
  if (state.crystalLedLight) {
    state.crystalLedLight.color.set(e.target.value);
  }
});

/* ── Reset View ── */
function resetView() {
  const active = state.meshGroup || state.cloudPoints;
  if (!active) return;
  const wasFullLock = state.cameraLocked === 'full';

function captureCanvasThumbnail(size) {
  const src = renderer.domElement;
  const side = Math.min(src.width, src.height);
  const sx = (src.width - side) / 2;
  const sy = (src.height - side) / 2;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(src, sx, sy, side, side, 0, 0, size, size);
  const dataUrl = canvas.toDataURL('image/png');
  return dataUrl.replace(/^data:image\/png;base64,/, '');
}

saveBtn.addEventListener('click', async () => {
  if (!state.geometryId || !state.generatedWith) return;
  saveBtn.disabled = true;

  try {

      generator: gw.generator,
      params: gw.params,
      seed: gw.seed,

      geometry_id: state.geometryId,
      thumbnail: captureCanvasThumbnail(256),
    };
    const resp = await fetch('/api/snapshots', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},

    });
    if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);
    saveToast.textContent = 'Saved!';
    saveToast.style.background = 'rgba(34,139,34,0.9)';
    saveToast.classList.add('visible');

async function openGallery() {

  galleryList.innerHTML = '';

  try {
    const resp = await fetch('/api/snapshots');

    galleryList.innerHTML = '';
    if (snapshots.length === 0) {

function formatParamsSummary(params) {
  return Object.entries(params)
    .map(([k, v]) => {
      if (typeof v === 'number') return `${k}=${Number(v.toFixed(4))}`;
      if (typeof v === 'string') return `${k}=${v}`;
      return `${k}=${JSON.stringify(v)}`;
    })
    .join(', ');
}

function buildSnapshotCard(snap) {
  const card = document.createElement('div');
  card.className = 'snap-card';

  const thumbDiv = document.createElement('div');
  thumbDiv.className = 'snap-thumb';
  if (snap.has_thumbnail && snap.thumbnail_url) {
    const img = document.createElement('img');
    img.src = snap.thumbnail_url;
    img.alt = snap.generator;
    thumbDiv.appendChild(img);
  } else {
    thumbDiv.textContent = '\u25A6';
  }

  const info = document.createElement('div');
  info.className = 'snap-info';
  const dateStr = snap.created_at ? new Date(snap.created_at).toLocaleString() : '—';
  const genDiv = document.createElement('div');
  genDiv.className = 'snap-gen';
  genDiv.textContent = snap.generator;
  const dateDiv = document.createElement('div');
  dateDiv.className = 'snap-date';
  dateDiv.textContent = dateStr;
  const paramsDiv = document.createElement('div');
  paramsDiv.className = 'snap-params';
  paramsDiv.textContent = formatParamsSummary(snap.params);
  info.appendChild(genDiv);
  info.appendChild(dateDiv);
  info.appendChild(paramsDiv);

  const actions = document.createElement('div');
  actions.className = 'snap-actions';
  const loadBtn = document.createElement('button');
  loadBtn.textContent = 'Load';
  loadBtn.addEventListener('click', () => loadSnapshot(snap));
  const delBtn = document.createElement('button');
  delBtn.textContent = 'Delete';
  delBtn.className = 'snap-delete';
  delBtn.addEventListener('click', () => deleteSnapshot(snap.snapshot_id, card));

  actions.appendChild(loadBtn);
  actions.appendChild(delBtn);
  card.appendChild(thumbDiv);
  card.appendChild(info);
  card.appendChild(actions);
  return card;
}

async function loadSnapshot(snap) {
  closeGallery();
  showLoading('Loading snapshot...');

  try {
    /* Set generator selector */
    searchInput.value = snap.generator;
    await fetchAndPopulateParams(snap.generator);

    /* Populate parameter fields */
    for (const [key, val] of Object.entries(snap.params)) {
      const input = document.getElementById(`param-${key}`);
      if (input) input.value = val;
    }

    /* Set seed */
    seedInput.value = snap.seed;

    /* Set container values */
    if (snap.container) {
      const c = snap.container;
      document.getElementById('dim-w').value = c.width_mm ?? 100;
      document.getElementById('dim-h').value = c.height_mm ?? 100;
      document.getElementById('dim-d').value = c.depth_mm ?? 100;
      document.getElementById('margin-x').value = c.margin_x_mm ?? 5;
      document.getElementById('margin-y').value = c.margin_y_mm ?? 5;
      document.getElementById('margin-z').value = c.margin_z_mm ?? 5;
    }

    /* Load saved geometry files directly */
    const savedCamera = saveCameraIfLocked();
    clearScene();
    const sid = snap.snapshot_id;
    const hasMesh = snap.geometry_files.includes('mesh.glb');
    const hasCloud = snap.geometry_files.includes('cloud.ply');

    if (hasMesh) {
      await displayMesh(`/api/snapshots/${sid}/geometry/mesh.glb`, snap.generator);
    }
    if (hasCloud) {
      const {points, vertexCount} = await loadCloudFromPLY(
        `/api/snapshots/${sid}/geometry/cloud.ply`
      );
      displayCloud(points, vertexCount, snap.generator);
    }

    if (viewModeNeedsMesh() && !hasMesh) {
      state.viewMode = 'points';
    }
    document.getElementById('view-mode').value = state.viewMode;
    restoreCameraIfSaved(savedCamera);
    applyViewMode();

    state.generatedWith = {
      generator: snap.generator,
      params: snap.params,
      seed: snap.seed,
      container: snap.container,
    };
    state.geometryId = null;
    document.getElementById('save-btn').disabled = true;
  } catch (err) {
    console.error('Load snapshot error:', err);
  } finally {
    hideLoading();
  }
}

async function deleteSnapshot(snapshotId, cardEl) {
  if (!confirm('Delete this snapshot?')) return;
  try {
    const resp = await fetch(`/api/snapshots/${snapshotId}`, {method: 'DELETE'});
    if (!resp.ok) throw new Error(`Delete failed: ${resp.status}`);
    cardEl.remove();
    if (galleryList.querySelectorAll('.snap-card').length === 0) {
      galleryEmpty.textContent = 'No saved snapshots yet.';
      galleryList.appendChild(galleryEmpty);
    }
  } catch (err) {
    console.error('Delete error:', err);
    alert('Failed to delete snapshot.');
  }
}

window.addEventListener('resize', () => {

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  if (state.crystalComposer) state.crystalComposer.setSize(w, h);
  if (state.compareMode) refreshPanelOverlays();

/* ── Render loop ── */
function renderCompareMode() {
  const dim = getGridDimension();
  const w = container.clientWidth;
  const h = container.clientHeight;
  const pw = Math.floor(w / dim);
  const ph = Math.floor(h / dim);

  camera.aspect = pw / ph;
  camera.updateProjectionMatrix();

  renderer.setScissorTest(true);
  renderer.autoClear = false;
  renderer.clear();

  for (const panel of state.comparePanels) {
    const col = panel.index % dim;
    const row = dim - 1 - Math.floor(panel.index / dim);
    const x = col * pw;
    const y = row * ph;

    renderer.setViewport(x, y, pw, ph);
    renderer.setScissor(x, y, pw, ph);
    renderer.render(panel.scene, camera);
  }

  renderer.setScissorTest(false);
  renderer.autoClear = true;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (state.compareMode && state.comparePanels.length > 0) {
    renderCompareMode();
  } else if (state.crystalActive && state.crystalComposer) {
    state.crystalComposer.render();
  } else {
    renderer.render(scene, camera);
  }
  updateFPS();
}

async function fetchGenerators() {

/* ── Parameter editor ── */
const paramPanel = document.getElementById('param-panel');
const paramFields = document.getElementById('param-fields');
const paramResSection = document.getElementById('param-resolution-section');
const paramResFields = document.getElementById('param-resolution-fields');
const paramError = document.getElementById('param-error');
const paramLoadingEl = document.getElementById('param-loading');

let cachedParamDefaults = null;

function createParamInput(name, value, description) {
  const row = document.createElement('div');
  row.className = 'editor-row param-row';
  const label = document.createElement('label');
  label.textContent = name;
  label.setAttribute('for', 'param-' + name);
  if (description) label.title = description;
  row.appendChild(label);

  let input;
  if (typeof value === 'boolean') {
    input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = value;
  } else if (typeof value === 'number') {
    input = document.createElement('input');
    input.type = 'number';
    input.className = 'control-input';
    input.value = value;
    input.step = Number.isInteger(value) ? '1' : '0.1';
  } else {
    input = document.createElement('input');
    input.type = 'text';
    input.className = 'control-input';
    input.value = String(value);
  }
  input.id = 'param-' + name;
  input.dataset.paramName = name;
  input.dataset.paramType = typeof value;
  row.appendChild(input);

  const wrapper = document.createElement('div');
  wrapper.appendChild(row);
  if (description) {
    const hint = document.createElement('div');
    hint.className = 'param-hint';
    hint.textContent = description;
    wrapper.appendChild(hint);
  }
  return wrapper;
}

function addResolutionWarning(input, wrapper, defaultValue) {
  const warn = document.createElement('div');
  warn.className = 'resolution-warning';
  warn.style.display = 'none';
  wrapper.appendChild(warn);
  const threshold = defaultValue * 4;
  function checkWarn() {
    const v = parseFloat(input.value);
    if (!Number.isNaN(v) && v > threshold) {
      warn.textContent = 'High value \u2014 may be slow';
      warn.style.display = 'block';
    } else {
      warn.style.display = 'none';
    }
  }
  input.addEventListener('input', checkWarn);
  checkWarn();
}

function collectParamValues(paramContainer) {
  const values = {};
  for (const input of paramContainer.querySelectorAll('input[data-param-name]')) {
    const name = input.dataset.paramName;
    const type = input.dataset.paramType;
    if (type === 'boolean') {
      values[name] = input.checked;
    } else if (type === 'number') {
      const parsed = parseFloat(input.value);
      if (Number.isNaN(parsed)) continue;
      values[name] = Number.isInteger(parsed) ? parseInt(input.value, 10) : parsed;
    } else {
      values[name] = input.value;
    }
  }
  return values;
}

function populateParamFields(data) {
  paramFields.innerHTML = '';
  paramResFields.innerHTML = '';
  paramResSection.style.display = 'none';

  for (const [name, value] of Object.entries(data.params)) {
    paramFields.appendChild(createParamInput(name, value, null));
  }

  if (data.resolution && Object.keys(data.resolution).length > 0) {
    paramResSection.style.display = 'block';
    for (const [name, value] of Object.entries(data.resolution)) {
      const desc = (data.descriptions && data.descriptions[name]) || null;
      const el = createParamInput(name, value, desc);
      const numInput = el.querySelector('input[type="number"]');
      if (numInput) addResolutionWarning(numInput, el, value);
      paramResFields.appendChild(el);
    }
  }
}

async function fetchAndPopulateParams(generatorName) {
  paramPanel.style.display = 'flex';
  paramError.style.display = 'none';
  cachedParamDefaults = null;
  cachedParamRanges = null;
  cachedParamRangesGen = null;

  try {
    const resp = await fetch('/api/generators/' + encodeURIComponent(generatorName) + '/params');
    if (!resp.ok) { paramPanel.style.display = 'none'; return; }
    const data = await resp.json();
    cachedParamDefaults = data;
    populateParamFields(data);
  } catch (e) {
    console.error('Failed to fetch params:', e);
    paramPanel.style.display = 'none';
  }
}

function getEditorParams() {
  return collectParamValues(paramFields);
}

function getEditorResolution() {
  return collectParamValues(paramResFields);
}

function resetParamDefaults() {
  if (!cachedParamDefaults) return;
  populateParamFields(cachedParamDefaults);
  paramError.style.display = 'none';
}

async function applyParams() {
  const currentGen = searchInput.value;
  if (!currentGen) return;
  const genParams = getEditorParams();
  const resolution = getEditorResolution();
  const seed = parseSeed();

  paramError.style.display = 'none';
  paramLoadingEl.style.display = 'block';
  showLoading('Generating...');
  _cancelController = new AbortController();

  try {
    const body = {generator: currentGen, params: genParams, seed, resolution, container: getContainerParams()};
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
      signal: _cancelController.signal,
    });
    if (!resp.ok) {
      const errData = await resp.json().catch(() => null);
      paramError.textContent = extractErrorMessage(errData, resp.status);
      paramError.style.display = 'block';
      return;
    }
    updateCacheStatus(resp);
    const data = await resp.json();
    await displayGenerateResult(data, currentGen);
  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error('Apply error:', err);
    paramError.textContent = 'Failed to generate: ' + err.message;
    paramError.style.display = 'block';
  } finally {
    paramLoadingEl.style.display = 'none';
    hideLoading();
  }
}

document.getElementById('param-reset-btn').addEventListener('click', resetParamDefaults);

/* ── Randomize parameters ── */
let cachedParamRanges = null;
let cachedParamRangesGen = null;

async function fetchParamRanges(generatorName) {
  try {
    const resp = await fetch('/api/generators/' + encodeURIComponent(generatorName) + '/param-ranges');
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    console.error('Failed to fetch param ranges:', e);
    return null;
  }
}

function randomizeInRange(min, max, step) {
  if (step <= 0) {
    console.warn('randomizeInRange: step <= 0, returning min');
    return min;
  }
  const steps = Math.floor((max - min) / step);
  const chosen = min + Math.floor(Math.random() * (steps + 1)) * step;
  return Math.min(chosen, max);
}

async function randomizeParams() {
  const currentGen = searchInput.value;
  if (!currentGen) return;

  if (!cachedParamRanges || cachedParamRangesGen !== currentGen) {
    cachedParamRanges = await fetchParamRanges(currentGen);
    cachedParamRangesGen = currentGen;
  }
  const ranges = cachedParamRanges || {};

  for (const input of paramFields.querySelectorAll('input[data-param-name]')) {
    const name = input.dataset.paramName;
    const type = input.dataset.paramType;
    if (type === 'boolean') {
      input.checked = Math.random() > 0.5;
      continue;
    }
    const range = ranges[name];
    if (range && type === 'number') {
      const val = randomizeInRange(range.min, range.max, range.step);
      input.value = Number.isInteger(range.step) && range.step >= 1 ? Math.round(val) : parseFloat(val.toFixed(6));
    }
  }

  // Randomize seed (0–999999)
  const seedInput = document.getElementById('seed-input');
  seedInput.value = Math.floor(Math.random() * 1000000);

  if (state.autoApply) {
    applyParams();
  }
}

document.getElementById('param-randomize-btn').addEventListener('click', randomizeParams);

document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    e.preventDefault();
    randomizeParams();
  }
});

let autoApplyTimer = null;
const AUTO_APPLY_DEBOUNCE_MS = 300;

document.getElementById('auto-apply').addEventListener('change', (e) => {
  state.autoApply = e.target.checked;

function handleAutoApplyInput(e) {
  if (!state.autoApply) return;
  if (e.target.tagName !== 'INPUT') return;
  if (e.target.id === 'auto-apply') return;
  if (autoApplyTimer !== null) clearTimeout(autoApplyTimer);
  autoApplyTimer = setTimeout(() => {
    autoApplyTimer = null;
    applyParams();
  }, AUTO_APPLY_DEBOUNCE_MS);
}

paramPanel.addEventListener('input', handleAutoApplyInput);

/* ── Enter key triggers regeneration on input fields ── */
function handleEnterKey(panel, action) {
  panel.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (e.target.tagName !== 'INPUT' || e.target.type === 'checkbox') return;
    e.preventDefault();
    e.target.blur();
    action();
  });
}

handleEnterKey(document.getElementById('controls'), () => {
  const currentGen = searchInput.value;
  if (!currentGen) return;
  applyGenerator(currentGen, parseSeed());
});

handleEnterKey(document.getElementById('container-panel'), () => {
  applyParams();
});

handleEnterKey(document.getElementById('param-panel'), () => {
  applyParams();
});

/* ── Compare mode ── */
const PANEL_LABELS = ['A','B','C','D','E','F','G','H','I'];

function createPanelScene() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(state.darkBg ? DARK_COLOR : LIGHT_COLOR);
  const lights = createLightingRig(1024);
  addLightsToScene(s, lights);
  applyLightIntensities(lights, state.darkBg);
  s.userData.lights = lights;
  return s;
}

function createPanelData(index, generator, params, seed) {
  return {
    index,
    generator: generator || '',
    params: params ? {...params} : {},
    seed: seed ?? 42,
    scene: createPanelScene(),
    meshGroup: null,
    cloudPoints: null,
    bboxHelper: null,
    loading: false,
  };
}

function getGridDimension() {
  if (state.compareMode === '2x2') return 2;
  if (state.compareMode === '3x3') return 3;
  return 1;
}

function createPanelOverlayDOM(panel) {
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const dim = getGridDimension();
  const pw = cw / dim;
  const ph = ch / dim;
  const col = panel.index % dim;
  const row = Math.floor(panel.index / dim);
  const left = col * pw;
  const top = row * ph;

  /* Panel label */
  const label = document.createElement('div');
  label.className = 'panel-label';
  label.dataset.panelIndex = panel.index;
  label.textContent = PANEL_LABELS[panel.index] || String(panel.index + 1);
  label.style.left = (left + 4) + 'px';
  label.style.top = (top + 4) + 'px';
  container.appendChild(label);

  /* Parameter overlay */
  const overlay = document.createElement('div');
  overlay.className = 'panel-overlay';
  overlay.dataset.panelIndex = panel.index;
  if (!state.darkBg) overlay.classList.add('light-bg');
  overlay.style.left = (left + 4) + 'px';
  overlay.style.top = (top + ph - 4) + 'px';
  overlay.style.transform = 'translateY(-100%)';

  const summary = document.createElement('div');
  summary.className = 'overlay-summary';
  summary.textContent = `seed: ${panel.seed}`;
  overlay.appendChild(summary);

  const editor = document.createElement('div');
  editor.className = 'overlay-editor';

  /* Seed row */
  const seedRow = document.createElement('div');
  seedRow.className = 'overlay-row';
  const seedLabel = document.createElement('label');
  seedLabel.textContent = 'seed';
  const seedInp = document.createElement('input');
  seedInp.type = 'number';
  seedInp.value = panel.seed;
  seedInp.dataset.overlayParam = 'seed';
  seedRow.appendChild(seedLabel);
  seedRow.appendChild(seedInp);
  editor.appendChild(seedRow);

  /* Param rows */
  for (const [k, v] of Object.entries(panel.params)) {
    const r = document.createElement('div');
    r.className = 'overlay-row';
    const lb = document.createElement('label');
    lb.textContent = k;
    const inp = document.createElement('input');
    inp.type = typeof v === 'number' ? 'number' : 'text';
    inp.value = v;
    inp.step = typeof v === 'number' && !Number.isInteger(v) ? '0.1' : '1';
    inp.dataset.overlayParam = k;
    r.appendChild(lb);
    r.appendChild(inp);
    editor.appendChild(r);
  }

  /* Apply button */
  const applyBtn = document.createElement('button');
  applyBtn.className = 'overlay-apply';
  applyBtn.textContent = 'Apply';
  applyBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    applyPanelOverlay(panel.index, overlay);
  });
  editor.appendChild(applyBtn);
  overlay.appendChild(editor);

  /* Toggle expand/collapse */
  summary.addEventListener('click', (e) => {
    e.stopPropagation();
    overlay.classList.toggle('expanded');
  });

  /* Spinner */
  const spinner = document.createElement('div');
  spinner.className = 'panel-spinner';
  spinner.dataset.panelIndex = panel.index;
  spinner.textContent = 'Loading...';
  spinner.style.left = (left + pw / 2) + 'px';
  spinner.style.top = (top + ph / 2) + 'px';
  container.appendChild(spinner);

  container.appendChild(overlay);
}

function removeAllPanelDOM() {
  for (const el of container.querySelectorAll('.panel-label,.panel-overlay,.panel-spinner')) {
    el.remove();
  }
}

function refreshPanelOverlays() {
  removeAllPanelDOM();
  if (!state.compareMode) return;
  for (const p of state.comparePanels) {
    createPanelOverlayDOM(p);
  }
}

function updatePanelOverlaySummary(panelIndex) {
  const overlay = container.querySelector(`.panel-overlay[data-panel-index="${panelIndex}"]`);
  if (!overlay) return;
  const panel = state.comparePanels[panelIndex];
  if (!panel) return;
  const base = state.comparePanels[0];
  const diffs = [];
  diffs.push(`seed: ${panel.seed}`);
  for (const [k, v] of Object.entries(panel.params)) {
    if (base && base.params[k] !== v) diffs.push(`${k}: ${v}`);
  }
  const summary = overlay.querySelector('.overlay-summary');
  if (summary) summary.textContent = diffs.join(', ');
}

function setPanelSpinner(panelIndex, visible) {
  const el = container.querySelector(`.panel-spinner[data-panel-index="${panelIndex}"]`);
  if (!el) return;
  el.style.display = visible ? 'block' : 'none';
  if (visible) { el.textContent = 'Loading...'; el.style.color = '#aaa'; }
}

function setPanelSpinnerError(panelIndex, msg) {
  const el = container.querySelector(`.panel-spinner[data-panel-index="${panelIndex}"]`);
  if (!el) return;
  el.textContent = msg;
  el.style.color = '#ff6b6b';
  el.style.display = 'block';
}

async function applyPanelOverlay(panelIndex, overlay) {
  const panel = state.comparePanels[panelIndex];
  if (!panel) return;

  /* Read values from overlay inputs */
  for (const inp of overlay.querySelectorAll('input[data-overlay-param]')) {
    const pname = inp.dataset.overlayParam;
    if (pname === 'seed') {
      panel.seed = parseInt(inp.value, 10) || 42;
    } else {
      const num = parseFloat(inp.value);
      panel.params[pname] = Number.isNaN(num) ? inp.value : num;
    }
  }

  overlay.classList.remove('expanded');
  updatePanelOverlaySummary(panelIndex);
  await regeneratePanel(panelIndex);
}

async function regeneratePanel(panelIndex) {
  const panel = state.comparePanels[panelIndex];
  if (!panel || !panel.generator) return;

  setPanelSpinner(panelIndex, true);
  panel.loading = true;

  try {
    const body = {
      generator: panel.generator,
      params: panel.params,
      seed: panel.seed,
      container: getContainerParams(),
    };
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      setPanelSpinnerError(panelIndex, `Error: ${resp.status}`);
      return;
    }
    const data = await resp.json();
    await loadPanelGeometry(panelIndex, data);
  } catch (err) {
    console.error(`Panel ${panelIndex} generate error:`, err);
  } finally {
    panel.loading = false;
    setPanelSpinner(panelIndex, false);
  }
}

async function loadPanelGeometry(panelIndex, data) {
  const panel = state.comparePanels[panelIndex];
  if (!panel) return;

  /* Clear panel scene geometry */
  if (panel.meshGroup) { panel.scene.remove(panel.meshGroup); panel.meshGroup = null; }
  if (panel.cloudPoints) { panel.scene.remove(panel.cloudPoints); panel.cloudPoints = null; }
  if (panel.bboxHelper) { panel.scene.remove(panel.bboxHelper); panel.bboxHelper = null; }

  /* Load mesh into panel scene */
  if (data.mesh_url) {
    const {group} = await loadMeshFromGLB(data.mesh_url + '?lod=preview');
    panel.meshGroup = group;
    panel.scene.add(group);
    addBoundingBoxToScene(panel);
  }
  if (data.cloud_url) {
    const {points} = await loadCloudFromPLY(data.cloud_url + '?lod=preview');
    panel.cloudPoints = points;
    panel.scene.add(points);
    if (!panel.meshGroup) addBoundingBoxToScene(panel);
  }
  applyViewModeToPanel(panel);
}

async function generateBatchPanels(panelIndices) {
  const containerParams = getContainerParams();
  const panels = panelIndices.map(i => {
    const p = state.comparePanels[i];
    return {
      generator: p.generator,
      params: p.params,
      seed: p.seed,
      container: containerParams,
    };
  });

  const total = panelIndices.length;
  for (const i of panelIndices) {
    setPanelSpinner(i, true);
    state.comparePanels[i].loading = true;
  }
  showLoading(`Generating 0/${total}...`);

  try {
    const resp = await fetch('/api/generate-batch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({panels}),
    });
    if (!resp.ok) {
      for (const i of panelIndices) {
        setPanelSpinnerError(i, `Error: ${resp.status}`);
        state.comparePanels[i].loading = false;
      }
      hideLoading();
      return;
    }
    const data = await resp.json();

    const limit = Math.min(data.panels.length, panelIndices.length);
    let completed = 0;
    const loadPromises = [];
    for (let j = 0; j < limit; j++) {
      const panelResult = data.panels[j];
      const panelIndex = panelIndices[j];
      if (panelResult.error) {
        setPanelSpinnerError(panelIndex, panelResult.error);
        state.comparePanels[panelIndex].loading = false;
        completed++;
        loadPromises.push(Promise.resolve());
      } else {
        loadPromises.push(
          loadPanelGeometry(panelIndex, panelResult).then(() => {
            setPanelSpinner(panelIndex, false);
            state.comparePanels[panelIndex].loading = false;
            completed++;
            document.getElementById('loading-text').textContent =
              `Generating ${completed}/${total}...`;
          })
        );
      }
    }
    await Promise.all(loadPromises);
  } catch (err) {
    console.error('Batch generate error:', err);
    for (const i of panelIndices) {
      setPanelSpinnerError(i, 'Error');
      state.comparePanels[i].loading = false;
    }
  } finally {
    hideLoading();
  }
}

function addBoundingBoxToScene(panel) {
  const helper = createBBoxHelper();
  panel.scene.add(helper);
  panel.bboxHelper = helper;
}

function applyViewModeToPanel(panel) {
  applyViewModeTo(panel.meshGroup, panel.cloudPoints);
}

function applyViewModeToAllPanels() {
  for (const p of state.comparePanels) applyViewModeToPanel(p);
}

function updatePointSizeInPanels(size) {
  const matSize = size * 0.01;
  for (const p of state.comparePanels) {
    p.scene.traverse((child) => {
      if (child.isPoints && child.material) child.material.size = matSize;
    });
  }
}

function updatePanelBackgrounds() {
  const color = new THREE.Color(state.darkBg ? DARK_COLOR : LIGHT_COLOR);
  for (const p of state.comparePanels) {
    p.scene.background = color.clone();
    if (p.scene.userData.lights) {
      applyLightIntensities(p.scene.userData.lights, state.darkBg);
    }
  }
  for (const el of container.querySelectorAll('.panel-overlay')) {
    el.classList.toggle('light-bg', !state.darkBg);
  }
}

function updatePanelBBoxVisibility(visible) {
  for (const p of state.comparePanels) {
    if (p.bboxHelper) p.bboxHelper.visible = visible;
  }
}

function disposeSceneResources(s) {
  s.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) {
        obj.material.forEach(m => m.dispose());
      } else {
        obj.material.dispose();
      }
    }
  });
}

function disposeAllPanels() {
  for (const p of state.comparePanels) {
    disposeSceneResources(p.scene);
  }
  state.comparePanels = [];
}

async function enterCompareMode(mode) {
  /* Exit crystal mode if active — the two modes conflict */
  if (state.crystalActive) {
    state.viewMode = 'points';
    document.getElementById('view-mode').value = 'points';
    exitCrystalMode();
    applyViewMode();
  }

  /* Clean up existing panels when switching modes directly */
  if (state.comparePanels.length > 0) {
    disposeAllPanels();
    removeAllPanelDOM();
  }

  state.compareMode = mode;
  const dim = getGridDimension();
  const count = dim * dim;

  /* Get current generator/params/seed */
  const gen = searchInput.value || '';
  const params = getEditorParams();
  const seed = parseSeed();

  /* Create panels, all starting with same generator/params */
  state.comparePanels = [];
  for (let i = 0; i < count; i++) {
    const panel = createPanelData(i, gen, params, seed + i);
    state.comparePanels.push(panel);
  }

  /* Copy panel 0 geometry from current single-view scene */
  if (state.meshGroup || state.cloudPoints) {
    const p0 = state.comparePanels[0];
    p0.seed = seed;
    if (state.meshGroup) {
      const clonedGroup = state.meshGroup.clone();
      p0.meshGroup = clonedGroup;
      p0.scene.add(clonedGroup);
    }
    if (state.cloudPoints) {
      const clonedPts = state.cloudPoints.clone();
      p0.cloudPoints = clonedPts;
      p0.scene.add(clonedPts);
    }
    addBoundingBoxToScene(p0);
    applyViewModeToPanel(p0);
  }

  refreshPanelOverlays();

  /* Generate remaining panels in parallel via batch endpoint */
  const startIdx = (state.meshGroup || state.cloudPoints) ? 1 : 0;
  const indicesToGenerate = [];
  for (let i = startIdx; i < count; i++) {
    indicesToGenerate.push(i);
  }
  if (indicesToGenerate.length > 0) {
    await generateBatchPanels(indicesToGenerate);
  }
}

function exitCompareMode() {
  /* Keep panel 0 geometry as active scene */
  const p0 = state.comparePanels[0];
  if (p0) {
    clearScene();
    if (p0.meshGroup) {
      state.meshGroup = p0.meshGroup.clone();
      scene.add(state.meshGroup);
    }
    if (p0.cloudPoints) {
      state.cloudPoints = p0.cloudPoints.clone();
      scene.add(state.cloudPoints);
    }
    const active = state.meshGroup || state.cloudPoints;
    if (active) {
      addBoundingBox(active);
      if (state.cameraLocked === 'off') fitCamera(active);
      enableResetView();
    }
    applyViewMode();
  }

  /* Dispose GPU resources and clean up */
  disposeAllPanels();
  state.compareMode = null;
  removeAllPanelDOM();

  /* Restore renderer viewport and camera aspect to full canvas */
  renderer.setViewport(0, 0, container.clientWidth, container.clientHeight);
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
}

/* Compare mode toggle */
document.getElementById('compare-mode').addEventListener('change', (e) => {
  const val = e.target.value;
  if (!val) {
    exitCompareMode();
  } else {
    enterCompareMode(val);
  }
});

/* Close overlay on outside click or Escape */
function collapseAllOverlays() {
  for (const el of container.querySelectorAll('.panel-overlay.expanded')) {
    el.classList.remove('expanded');
  }
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.panel-overlay')) collapseAllOverlays();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') collapseAllOverlays();
});

/* ── Init: load from URL params ── */
const qp = parseQueryParams();
seedInput.value = qp.seed;

fetchGenerators().then(() => {
  if (qp.generator) {
    searchInput.value = qp.generator;
    fetchAndPopulateParams(qp.generator);
  }
});

if (qp.file) {
  loadFromFile(qp.file);
} else if (qp.generator) {
  loadFromAPI(qp.generator, qp.genParams, qp.seed);
}

/* Compute usable volume after all inputs are initialized */
updateUsableVolume();
</script>
